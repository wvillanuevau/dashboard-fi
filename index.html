<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Proyectos Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0a08;--surface:#161410;--surface2:#1e1c19;--border:#2a2824;
  --text:#e8e6e1;--muted:#888;--accent:#e8a020;--green:#2db87a;--red:#e84040;
  --sidebar:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── LAYOUT ── */
#appShell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:50;transition:transform .25s}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.content-scroll{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.sb-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--accent);line-height:1.1}
.sb-logo-sub{font-size:10px;color:var(--muted);font-weight:400}
.sb-section{padding:12px 10px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:1px 8px;
  cursor:pointer;border-radius:9px;font-size:13px;color:#a8a39c;transition:all .12s;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#000;font-weight:700}
.nav-item .ni{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-bottom{padding:12px 8px;border-top:1px solid var(--border);margin-top:auto}
.empresa-badge{padding:8px 12px;background:var(--surface2);border-radius:8px;font-size:11px;color:var(--muted);margin:0 8px 10px}
.empresa-badge strong{color:var(--accent);display:block;font-size:13px}

/* ── TOPBAR ── */
.page-ttl{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.topbar-right{display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Karla',sans-serif;
  font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;line-height:1}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#f5aa24}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#252220}
.btn-success{background:#0d2a1a;color:var(--green);border:1px solid #1a4a2a}
.btn-success:hover{background:#122e1e}
.btn-danger{background:#200a0a;color:var(--red);border:1px solid #3a1212}
.btn-danger:hover{background:#2a0f0f}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-sm{padding:14px 16px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px}
.kpi-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── TABLA ── */
.tbl-wrap{border-radius:12px;border:1px solid var(--border);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);background:#111009;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #1a1815;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#181612}
.td-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fg label,.fg-lbl{display:block;margin-bottom:5px;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
input,select,textarea{width:100%;padding:9px 12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:'Karla',sans-serif;font-size:14px;transition:border-color .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input[type=range]{padding:4px 0;background:none;border:none;cursor:pointer;accent-color:var(--accent)}
input[type=checkbox]{width:auto;accent-color:var(--accent);cursor:pointer}
input[type=date]{color-scheme:dark}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── PROGRESS ── */
.prog{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}

/* ── BADGE ── */
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;white-space:nowrap}
.b-ok{background:#0d2a1a;color:var(--green)}
.b-warn{background:#2a1e0a;color:var(--accent)}
.b-err{background:#200a0a;color:var(--red)}
.b-neu{background:var(--surface2);color:#aaa}
.b-blue{background:#0a1a2a;color:#4ea8de}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:200;padding:12px}
.modal.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  width:100%;padding:24px;max-height:92vh;overflow-y:auto}
.modal-box.sm{max-width:480px}
.modal-box.md{max-width:660px}
.modal-box.lg{max-width:900px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-ttl{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0}
.tab{padding:10px 18px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;
  white-space:nowrap;border-bottom:2px solid transparent;transition:all .12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);
  border-left:3px solid var(--green);padding:11px 18px;border-radius:9px;
  font-size:13px;display:none;z-index:999;box-shadow:0 6px 24px rgba(0,0,0,.5)}

/* ── LOGIN ── */
.login-page{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:40px;width:100%;max-width:400px;text-align:center}
.u-card{padding:12px 16px;background:var(--surface2);margin:7px 0;border-radius:9px;
  cursor:pointer;border:2px solid transparent;transition:all .12s;text-align:left;display:flex;align-items:center;gap:12px}
.u-card:hover{background:#252220}
.u-card.sel{border-color:var(--accent)}
.u-av{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px;flex-shrink:0}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:18px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;background:#2a2824;transition:background .12s}
.pin-dot.on{background:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:210px;margin:0 auto}
.pin-btn{padding:16px;border-radius:11px;font-size:18px;font-weight:700;justify-content:center}

/* ── MOBILE ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40}
.overlay.on{display:block}
.hamburger{display:none;position:fixed;bottom:20px;right:20px;width:54px;height:54px;
  border-radius:50%;background:var(--accent);border:none;font-size:20px;z-index:60;
  cursor:pointer;box-shadow:0 4px 16px rgba(232,160,32,.4);align-items:center;justify-content:center;color:#000}

/* cronograma estado */
.cron-locked{opacity:.5;pointer-events:none}
.sub-row{background:#111009}
.sub-row td:first-child{padding-left:32px}
.cron-accepted .sub-row{background:#0d1a10}

.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.section-hdr{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;margin-top:4px}
.empty{text-align:center;padding:40px;color:#444;font-size:13px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface2);border-radius:6px;font-size:12px;color:var(--muted)}

@media(max-width:800px){
  .sidebar{position:fixed;height:100%;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .main-area{width:100%}
  .hamburger{display:flex}
  .row2,.row3{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .content-scroll{padding:16px}
}
@media(max-width:420px){.kpi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div style="width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px">📊</div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)">Proyectos Pro</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:28px">Dashboard de Control</div>
    <div class="fg" style="text-align:left">
      <label>Código de Empresa</label>
      <input id="empCode" placeholder="Ej: DEMO" onkeydown="if(event.key==='Enter')checkEmp()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="checkEmp()">Continuar →</button>
    <div id="uPanel" style="display:none;margin-top:22px"></div>
  </div>
</div>

<!-- APP -->
<div id="appShell" style="display:none" class="">
  <div id="overlay" class="overlay" onclick="closeSB()"></div>
  <div id="appInner" style="display:flex;height:100vh;overflow:hidden">
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-icon">📊</div>
        <div><div class="sb-logo-text">Proyectos Pro</div><div class="sb-logo-sub">Dashboard de Control</div></div>
      </div>
      <div style="overflow-y:auto;flex:1">
        <div class="sb-section">Principal</div>
        <nav id="nav"></nav>
      </div>
      <div class="sb-bottom">
        <div class="empresa-badge"><span style="font-size:10px;color:var(--muted)">Empresa</span><strong id="empLabel">—</strong></div>
        <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="logout()">🚪 Cerrar sesión</button>
      </div>
    </div>
    <div class="main-area">
      <div class="topbar">
        <div class="page-ttl" id="pageTitle">Dashboard</div>
        <div class="topbar-right" id="headerActions"></div>
      </div>
      <div class="content-scroll" id="content"></div>
    </div>
  </div>
  <button class="hamburger" id="hmbBtn" onclick="toggleSB()">☰</button>
</div>

<div id="toast" class="toast"></div>

<!-- MODAL NUEVO PROYECTO -->
<div id="modalNP" class="modal">
  <div class="modal-box sm">
    <div class="modal-hdr"><span class="modal-ttl">➕ Nuevo Proyecto</span><button class="btn btn-secondary btn-sm" onclick="closeModal('modalNP')">✕</button></div>
    <div class="row2">
      <div class="fg"><label>Nombre *</label><input id="npNombre" placeholder="Ej: Local #5 Armenia"></div>
      <div class="fg"><label>Marca</label><select id="npMarca"></select></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Tipo</label><select id="npTipo"><option>Remodelación</option><option>Construcción nueva</option></select></div>
      <div class="fg"><label>Ubicación</label><input id="npUbic" placeholder="Ciudad / dirección"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
      <button class="btn btn-secondary" onclick="closeModal('modalNP')">Cancelar</button>
      <button class="btn btn-primary" onclick="crearProyecto()">✓ Crear</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE PROYECTO -->
<div id="modalDP" class="modal">
  <div class="modal-box lg">
    <div id="dpContent"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('modalDP')">Cerrar</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════
const S={
  empresa:'DEMO',
  proyectos:[],
  gastos:[],
  proveedores:[],
  centros:[],          // centros de costo (pueden ser o no un proyecto)
  marcas:['Papa Johns','Jimmy Johns'],
  usuarios:[{nombre:'Admin',pin:'1234',rol:'admin'}],
  activeTab:'dashboard',
  currentUser:null
};

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(n){return'$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function addDias(dateStr,dias){if(!dateStr||!dias)return'';const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+parseInt(dias));return d.toISOString().slice(0,10)}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.style.borderLeftColor=err?'var(--red)':'var(--green)';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3000)}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function badgeEst(e){const m={'Sin iniciar':'b-neu','En ejecución':'b-warn','Retrasado':'b-err','Finalizado':'b-ok'};return`<span class="badge ${m[e]||'b-neu'}">${e}</span>`}
function toggleSB(){const s=document.getElementById('sidebar'),o=document.getElementById('overlay'),b=document.getElementById('hmbBtn');const op=s.classList.contains('open');s.classList.toggle('open');o.classList.toggle('on');b.textContent=op?'☰':'✕'}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('on');document.getElementById('hmbBtn').textContent='☰'}

// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
function loadData(){
  try{
    const r=localStorage.getItem('pp3_'+S.empresa);
    if(r){const d=JSON.parse(r);S.proyectos=d.proyectos||[];S.gastos=d.gastos||[];S.proveedores=d.proveedores||[];S.centros=d.centros||[];S.marcas=d.marcas||['Papa Johns','Jimmy Johns'];S.usuarios=d.usuarios||[{nombre:'Admin',pin:'1234',rol:'admin'}];}
    else{S.proyectos=[];S.gastos=[];S.proveedores=[{id:'pv1',nombre:'Proveedor Demo',tipo:'General',tel:''}];S.centros=[{id:'cc1',nombre:'Oficina Central',proyectoId:'',descripcion:''}];}
  }catch(e){toast('Error al cargar datos',true)}
}
function saveData(){
  try{localStorage.setItem('pp3_'+S.empresa,JSON.stringify({proyectos:S.proyectos,gastos:S.gastos,proveedores:S.proveedores,centros:S.centros,marcas:S.marcas,usuarios:S.usuarios}))}
  catch(e){toast('Error al guardar (almacenamiento lleno)',true)}
}
function refreshMarcaSel(){const el=document.getElementById('npMarca');if(el)el.innerHTML=S.marcas.map(m=>`<option>${m}</option>`).join('')}

// ═══════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════
let lIdx=null,pinBuf='';

function checkEmp(){
  const code=document.getElementById('empCode').value.trim().toUpperCase();
  if(!code){toast('Ingrese código de empresa',true);return}
  S.empresa=code;loadData();
  const p=document.getElementById('uPanel');p.style.display='block';
  let h='<div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px">Seleccione usuario</div>';
  S.usuarios.forEach((u,i)=>{
    const av=u.nombre.charAt(0).toUpperCase();
    h+=`<div class="u-card" id="uc${i}" onclick="selUser(${i})">
      <div class="u-av">${av}</div>
      <div><div style="font-weight:600;font-size:14px">${esc(u.nombre)}</div><div style="font-size:11px;color:var(--muted)">${u.rol}</div></div>
    </div>`;
  });
  h+=`<div style="margin-top:18px">
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-pad" id="pinPad"></div>
    <div id="pinErr" style="color:var(--red);font-size:12px;margin-top:10px;min-height:18px;text-align:center"></div>
  </div>`;
  p.innerHTML=h;renderPinDots();buildPinPad();
}

function selUser(i){lIdx=i;pinBuf='';document.querySelectorAll('.u-card').forEach((c,j)=>c.classList.toggle('sel',j===i));renderPinDots();document.getElementById('pinErr').textContent=''}
function renderPinDots(){const el=document.getElementById('pinDots');if(!el)return;el.innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinBuf.length?'on':''}"></div>`).join('')}
function buildPinPad(){
  const pad=document.getElementById('pinPad');if(!pad)return;pad.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k=>{
    const b=document.createElement('button');b.className='btn btn-secondary pin-btn';
    if(k===''){b.disabled=true;b.style.opacity='0';}else{b.textContent=k;b.onclick=()=>pinKey(k.toString())}
    pad.appendChild(b);
  });
}
function pinKey(k){
  if(lIdx===null){document.getElementById('pinErr').textContent='Seleccione usuario';return}
  if(k==='⌫')pinBuf=pinBuf.slice(0,-1);
  else if(pinBuf.length<4)pinBuf+=k;
  renderPinDots();if(pinBuf.length===4)setTimeout(checkPin,80);
}
function checkPin(){
  if(pinBuf===S.usuarios[lIdx].pin){
    S.currentUser=S.usuarios[lIdx];
    document.getElementById('loginPage').style.display='none';
    const app=document.getElementById('appShell');app.style.display='block';
    document.getElementById('empLabel').textContent=S.empresa;
    refreshMarcaSel();S.activeTab='dashboard';render();toast('Bienvenido, '+S.currentUser.nombre);
  }else{document.getElementById('pinErr').textContent='PIN incorrecto';pinBuf='';renderPinDots()}
}
function logout(){S.currentUser=null;lIdx=null;pinBuf='';document.getElementById('appShell').style.display='none';document.getElementById('loginPage').style.display='flex';document.getElementById('uPanel').style.display='none';document.getElementById('empCode').value='';closeSB()}

// ═══════════════════════════════════════════════════════
//  GASTOS — helpers
// ═══════════════════════════════════════════════════════
function gastosDeProyecto(pid){return S.gastos.filter(g=>g.proyectoId===pid)}
function totalGastosProyecto(pid){return gastosDeProyecto(pid).reduce((s,g)=>s+(parseFloat(g.valor)||0),0)}

// ═══════════════════════════════════════════════════════
//  PROYECTOS
// ═══════════════════════════════════════════════════════
function crearProyecto(){
  const nombre=document.getElementById('npNombre').value.trim();
  if(!nombre){toast('Ingrese nombre',true);return}
  const pid=genId();
  const p={id:pid,nombre,marca:document.getElementById('npMarca').value,
    tipo:document.getElementById('npTipo').value,ubicacion:document.getElementById('npUbic').value.trim(),
    estado:'Sin iniciar',avanceFisico:0,
    montoObraCivil:0,
    pagos:{imp:{monto:0,paid:false}},
    cronograma:{aceptado:false,fechaInicio:'',partidas:[]},
    contratista:'',supervisor:'',observaciones:''};
  S.proyectos.push(p);
  // Crear Centro de Costo automáticamente vinculado al proyecto
  S.centros.push({id:genId(),nombre:nombre,descripcion:'Centro de costo generado automáticamente',proyectoId:pid,auto:true});
  saveData();closeModal('modalNP');
  document.getElementById('npNombre').value='';document.getElementById('npUbic').value='';
  render();toast('✓ Proyecto creado — Centro de Costo generado automáticamente');
}

function elimProyecto(id){
  const p=S.proyectos.find(x=>x.id===id);if(!p)return;
  if(!confirm(`¿Eliminar "${p.nombre}"? Se eliminará también su Centro de Costo vinculado. No se puede deshacer.`))return;
  S.proyectos=S.proyectos.filter(x=>x.id!==id);
  // Eliminar centros de costo que fueron auto-generados para este proyecto
  S.centros=S.centros.filter(c=>!(c.proyectoId===id&&c.auto));
  saveData();closeModal('modalDP');render();toast('✓ Proyecto y su Centro de Costo eliminados');
}

function updP(id,campo,val){const p=S.proyectos.find(x=>x.id===id);if(p){p[campo]=val;saveData()}}
function updPago(id,campo,val){const p=S.proyectos.find(x=>x.id===id);if(p){p.pagos[campo]=val;saveData()}}

//  VER PROYECTO — modal con tabs
// ═══════════════════════════════════════════════════════
function verProy(id){
  const p=S.proyectos.find(x=>x.id===id);if(!p)return;
  const c=document.getElementById('dpContent');
  c.innerHTML=`
    <div class="modal-hdr">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="modal-ttl">📋 ${esc(p.nombre)}</span>
        ${badgeEst(p.estado)}
      </div>
    </div>
    <div class="tabs" id="dpTabs">
      <div class="tab active" data-t="gen">⚙ General</div>
      <div class="tab" data-t="pagos">💰 Pagos</div>
      <div class="tab" data-t="gastos">🧾 Gastos</div>
      <div class="tab" data-t="cron">📅 Cronograma</div>
    </div>
    <div id="dpPanel"></div>`;
  openModal('modalDP');
  swTab('gen',id);
  document.querySelectorAll('#dpTabs .tab').forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll('#dpTabs .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');swTab(t.dataset.t,id);
    };
  });
}

function swTab(tab,id){
  const p=S.proyectos.find(x=>x.id===id);if(!p)return;
  const panel=document.getElementById('dpPanel');
  if(tab==='gen')    panel.innerHTML=tplGen(p);
  else if(tab==='pagos')  panel.innerHTML=tplPagos(p);
  else if(tab==='gastos') panel.innerHTML=tplGastosProy(p);
  else if(tab==='cron')   panel.innerHTML=tplCron(p);
}

// ── TAB CRONOGRAMA ──
function tplCron(p){
  const cr=p.cronograma;
  const isAc=cr.aceptado;
  const totalDias=cr.partidas.reduce((s,m)=>s+m.sub.reduce((ss,x)=>ss+(parseInt(x.dias)||0),0),0);
  const fechaFin=addDias(cr.fechaInicio,totalDias);

  let html=`
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
    ${isAc
      ?`<span class="badge b-ok" style="font-size:12px;padding:6px 14px">✓ Oferta y cronograma ACEPTADOS</span>
         <button class="btn btn-danger btn-sm" onclick="toggleCronAcept('${p.id}',false)">Desbloquear</button>`
      :`<button class="btn btn-success" onclick="toggleCronAcept('${p.id}',true)">
          ✓ Aceptar oferta y cronograma
        </button>
        <span style="font-size:12px;color:var(--muted)">Acepta para habilitar seguimiento</span>`
    }
  </div>
  <div class="row3" style="margin-bottom:16px">
    <div class="fg"><label>Fecha de inicio</label>
      <input type="date" value="${cr.fechaInicio||''}" ${isAc?'':'disabled'}
        onchange="updCron('${p.id}','fechaInicio',this.value)">
    </div>
    <div class="fg"><label>Días totales</label>
      <input value="${totalDias}" disabled style="color:var(--accent)">
    </div>
    <div class="fg"><label>Fecha estimada de fin</label>
      <input value="${fechaFin?fmtDate(fechaFin):'—'}" disabled style="color:var(--green)">
    </div>
  </div>`;

  if(cr.partidas.length===0&&!isAc){
    html+=`<div class="empty">Sin partidas aún — agregue partidas para construir el cronograma</div>`;
  }

  html+=`<div class="tbl-wrap ${isAc?'cron-accepted':''}">
  <table>
    <thead><tr>
      <th>Partida / Subpartida</th>
      <th>Días</th>
      ${isAc?'<th>Realizado</th>':''}
      <th>Cant.</th><th>Precio</th><th>Total</th>
      <th></th>
    </tr></thead><tbody>`;

  let grandTotal=0;
  cr.partidas.forEach((m,mi)=>{
    const diasPart=m.sub.reduce((s,x)=>s+(parseInt(x.dias)||0),0);
    const totalPart=m.sub.reduce((s,x)=>s+((parseFloat(x.cantidad)||0)*(parseFloat(x.precio)||0)),0);
    grandTotal+=totalPart;
    const doneSub=m.sub.filter(x=>x.done).length;
    html+=`<tr style="background:#111009">
      <td><input value="${esc(m.nombre)}" style="font-weight:600;background:transparent;border:none;color:var(--text)"
        ${isAc?'':''}
        onchange="updPartida('${p.id}',${mi},'nombre',this.value)"></td>
      <td><span style="color:var(--accent);font-weight:700">${diasPart}</span> <span style="font-size:11px;color:var(--muted)">días</span></td>
      ${isAc?`<td><span style="font-size:12px;color:var(--muted)">${doneSub}/${m.sub.length}</span></td>`:''}
      <td colspan="2" style="color:var(--muted);font-size:12px">${m.sub.length} sub</td>
      <td><strong>${fmt(totalPart)}</strong></td>
      <td class="td-actions">
        <button class="btn btn-secondary btn-xs" onclick="addSub('${p.id}',${mi})">+ Sub</button>
        <button class="btn btn-danger btn-xs" onclick="delPartida('${p.id}',${mi})">✕</button>
      </td>
    </tr>`;
    m.sub.forEach((s,si)=>{
      const tot=(parseFloat(s.cantidad)||0)*(parseFloat(s.precio)||0);
      html+=`<tr class="sub-row">
        <td>
          ${isAc?`<input type="checkbox" ${s.done?'checked':''} onchange="updSub('${p.id}',${mi},${si},'done',this.checked)"> `:''}
          <input value="${esc(s.desc||'')}" placeholder="Descripción" style="width:calc(100% - ${isAc?'28px':'4px'})"
            onchange="updSub('${p.id}',${mi},${si},'desc',this.value)"
            ${s.done&&isAc?'style="text-decoration:line-through;opacity:.5"':''}>
        </td>
        <td><input type="number" min="1" value="${s.dias||1}" style="width:64px"
          ${isAc?'':'disabled'}
          onchange="updSub('${p.id}',${mi},${si},'dias',parseInt(this.value)||1);reloadTab('cron','${p.id}')"></td>
        ${isAc?`<td></td>`:''}
        <td><input type="number" min="0" value="${s.cantidad||0}" style="width:72px"
          onchange="updSub('${p.id}',${mi},${si},'cantidad',parseFloat(this.value)||0)"></td>
        <td><input type="number" min="0" value="${s.precio||0}" style="width:80px"
          onchange="updSub('${p.id}',${mi},${si},'precio',parseFloat(this.value)||0)"></td>
        <td>${fmt(tot)}</td>
        <td><button class="btn btn-danger btn-xs" onclick="delSub('${p.id}',${mi},${si})">✕</button></td>
      </tr>`;
    });
  });

  html+=`<tr style="background:#111009;font-weight:700">
    <td colspan="${isAc?4:3}" style="text-align:right;padding-right:12px;color:var(--muted);font-size:12px">TOTAL:</td>
    <td colspan="2"><strong style="color:var(--accent)">${fmt(grandTotal)}</strong></td>
    <td></td>
  </tr>`;
  html+=`</tbody></table></div>`;
  html+=`<div style="margin-top:12px">
    <button class="btn btn-primary" onclick="addPartida('${p.id}')">+ Agregar Partida</button>
  </div>`;
  return html;
}

// ── CRONOGRAMA helpers ──
function updCron(pid,campo,val){const p=S.proyectos.find(x=>x.id===pid);if(p){p.cronograma[campo]=val;saveData();reloadTab('cron',pid)}}
function toggleCronAcept(pid,val){const p=S.proyectos.find(x=>x.id===pid);if(p){p.cronograma.aceptado=val;saveData();reloadTab('cron',pid)}}
function updPartida(pid,mi,campo,val){const p=S.proyectos.find(x=>x.id===pid);if(p&&p.cronograma.partidas[mi]){p.cronograma.partidas[mi][campo]=val;saveData()}}
function updSub(pid,mi,si,campo,val){const p=S.proyectos.find(x=>x.id===pid);if(p&&p.cronograma.partidas[mi]&&p.cronograma.partidas[mi].sub[si]){p.cronograma.partidas[mi].sub[si][campo]=val;saveData();if(campo==='dias')reloadTab('cron',pid)}}
function addPartida(pid){const p=S.proyectos.find(x=>x.id===pid);if(!p)return;p.cronograma.partidas.push({id:genId(),nombre:'Nueva Partida',sub:[]});saveData();reloadTab('cron',pid)}
function addSub(pid,mi){const p=S.proyectos.find(x=>x.id===pid);if(!p||!p.cronograma.partidas[mi])return;p.cronograma.partidas[mi].sub.push({id:genId(),desc:'',cantidad:0,precio:0,dias:1,done:false});saveData();reloadTab('cron',pid)}
function delPartida(pid,mi){const p=S.proyectos.find(x=>x.id===pid);if(!p)return;if(!confirm('¿Eliminar esta partida?'))return;p.cronograma.partidas.splice(mi,1);saveData();reloadTab('cron',pid)}
function delSub(pid,mi,si){const p=S.proyectos.find(x=>x.id===pid);if(!p||!p.cronograma.partidas[mi])return;p.cronograma.partidas[mi].sub.splice(si,1);saveData();reloadTab('cron',pid)}

      <td>${esc(g.factura)}</td>
      <td>${esc(g.descripcion)}</td>
      <td>${esc(g.proveedor)}</td>
      <td><strong>${fmt(g.valor)}</strong></td>
      <td>${fmtDate(g.fecha)}</td>

  const ccOpts=S.centros.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join('');

    <div class="kpi"><div class="kpi-lbl">Registros</div><div class="kpi-val">${S.gastos.length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Sin proyecto</div><div class="kpi-val" style="color:var(--muted)">${noProy}</div></div>

      <div class="fg"><label>Factura *</label><input id="gFact" placeholder="No. factura o referencia"></div>
      <div class="fg"><label>Proveedor *</label>
        <select id="gProv"><option value="">— Seleccionar —</option>${S.proveedores.map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="row3">
      <div class="fg"><label>Valor * ($)</label><input type="number" min="0" id="gValor" placeholder="0.00"></div>
      <div class="fg"><label>Fecha</label><input type="date" id="gFecha" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>Centro de Costo</label>
        <select id="gCC"><option value="">— Ninguno —</option>${ccOpts}</select>
      </div>
    </div>
    <div class="row2">
      <div class="fg"><label>Descripción</label><input id="gDesc" placeholder="Descripción del gasto"></div>
      <div class="fg"><label>¿Pertenece a un proyecto?</label>
        <select id="gProy">
          <option value="">— Gasto general —</option>
          ${proyOpts}
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="regGasto()">+ Registrar Gasto</button>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Factura</th><th>Descripción</th><th>Proveedor</th><th>Valor</th><th>Fecha</th><th>Proyecto</th><th></th></tr></thead>

function regGasto(){
  const factura=document.getElementById('gFact').value.trim();
  const provId=document.getElementById('gProv').value;
  const valor=parseFloat(document.getElementById('gValor').value)||0;
  const desc=document.getElementById('gDesc').value.trim();
  const fecha=document.getElementById('gFecha').value;
  const proyId=document.getElementById('gProy').value;
  const ccId=document.getElementById('gCC').value;
  if(!factura){toast('Ingrese número de factura',true);return}
  if(!provId){toast('Seleccione proveedor',true);return}
  if(valor<=0){toast('Ingrese valor mayor a 0',true);return}
  const prov=S.proveedores.find(x=>x.id===provId);
  S.gastos.push({id:genId(),factura,descripcion:desc,proveedor:prov?prov.nombre:'',valor,fecha,proyectoId:proyId||null,centroId:ccId||null});
  saveData();render();toast('✓ Gasto registrado');
}

function delGasto(id){
  if(!confirm('¿Eliminar este gasto?'))return;
  S.gastos=S.gastos.filter(g=>g.id!==id);saveData();render();
}

  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Nombre</th><th>Tipo</th><th>Teléfono</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function addProv(){const n=document.getElementById('pvN').value.trim();if(!n){toast('Nombre requerido',true);return}S.proveedores.push({id:genId(),nombre:n,tipo:document.getElementById('pvT').value.trim(),tel:document.getElementById('pvTel').value.trim()});saveData();render();toast('✓ Proveedor registrado')}
function delProv(id){if(!confirm('¿Eliminar proveedor?'))return;S.proveedores=S.proveedores.filter(x=>x.id!==id);saveData();render()}

// ═══════════════════════════════════════════════════════
//  CENTROS DE COSTO
// ═══════════════════════════════════════════════════════
function renderCentros(){
  let rows=S.centros.length===0?`<tr><td colspan="5" class="empty">Sin centros de costo</td></tr>`:'';
  S.centros.forEach(c=>{
    const pname=c.proyectoId?S.proyectos.find(x=>x.id===c.proyectoId)?.nombre||'(proyecto eliminado)':'—';
    const origen=c.auto
      ?`<span class="badge b-blue" title="Generado al crear el proyecto">🏗 ${esc(pname)}</span>`
      :(c.proyectoId?`<span class="badge b-warn">${esc(pname)}</span>`:'<span class="badge b-neu">Independiente</span>');
    const accion=c.auto
      ?`<span style="font-size:11px;color:var(--muted)" title="Se elimina al borrar el proyecto">Auto</span>`
      :`<button class="btn btn-danger btn-xs" onclick="delCentro('${c.id}')">✕</button>`;
    rows+=`<tr>
      <td><strong>${esc(c.nombre)}</strong></td>
      <td style="font-size:12px;color:var(--muted)">${esc(c.descripcion||'—')}</td>
      <td>${origen}</td>
      <td>${c.auto?'<span class="badge b-ok" style="font-size:10px">Automático</span>':'<span class="badge b-neu" style="font-size:10px">Manual</span>'}</td>
      <td>${accion}</td>
    </tr>`;
  });
  const proyOpts=`<option value="">— Sin proyecto —</option>`+S.proyectos.map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('');
  document.getElementById('content').innerHTML=`
  <div style="background:#0a1a10;border:1px solid #1a3a20;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#a0c8a8">
    ℹ️ Al <strong style="color:var(--accent)">crear un proyecto</strong>, su Centro de Costo se genera automáticamente. Los centros manuales pueden existir de forma independiente o vincularse a un proyecto.
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="section-hdr">Nuevo Centro de Costo (independiente)</div>
    <div class="row3">
      <div class="fg"><label>Nombre *</label><input id="ccN" placeholder="Centro de costo"></div>
      <div class="fg"><label>Descripción</label><input id="ccD" placeholder="Descripción opcional"></div>
      <div class="fg"><label>Vincular a Proyecto (opcional)</label><select id="ccP">${proyOpts}</select></div>
    </div>
    <button class="btn btn-primary" onclick="addCentro()">+ Agregar</button>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Nombre</th><th>Descripción</th><th>Proyecto vinculado</th><th>Origen</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function addCentro(){const n=document.getElementById('ccN').value.trim();if(!n){toast('Nombre requerido',true);return}S.centros.push({id:genId(),nombre:n,descripcion:document.getElementById('ccD').value.trim(),proyectoId:document.getElementById('ccP').value||null,auto:false});saveData();render();toast('✓ Centro registrado')}
function delCentro(id){
  const c=S.centros.find(x=>x.id===id);
  if(c?.auto){toast('Este centro fue creado automáticamente — elimine el proyecto para borrarlo',true);return}
  if(!confirm('¿Eliminar centro de costo?'))return;
  S.centros=S.centros.filter(x=>x.id!==id);saveData();render();
}

// ═══════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════════════════════════════
function renderConfig(){
  const mH=S.marcas.map((m,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px">
    <input value="${esc(m)}" onchange="S.marcas[${i}]=this.value;saveData();refreshMarcaSel()">
    <button class="btn btn-danger btn-sm" onclick="S.marcas.splice(${i},1);saveData();render()">✕</button>
  </div>`).join('');
  const uH=S.usuarios.map((u,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <input value="${esc(u.nombre)}" style="flex:2;min-width:100px" onchange="S.usuarios[${i}].nombre=this.value;saveData()">
    <input type="password" value="${esc(u.pin)}" style="width:76px" maxlength="4" placeholder="PIN" onchange="S.usuarios[${i}].pin=this.value;saveData()">
    <select style="width:96px" onchange="S.usuarios[${i}].rol=this.value;saveData()">
      <option ${u.rol==='admin'?'selected':''}>admin</option><option ${u.rol==='viewer'?'selected':''}>viewer</option>
    </select>
    <button class="btn btn-danger btn-sm" onclick="if(S.usuarios.length>1){S.usuarios.splice(${i},1);saveData();render()}else toast('Mínimo 1 usuario',true)">✕</button>
  </div>`).join('');
  document.getElementById('content').innerHTML=`
  <div class="row2">
    <div class="card"><div class="section-hdr">Marcas</div>${mH}
      <div style="display:flex;gap:8px;margin-top:8px"><input id="nmarca" placeholder="Nueva marca" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addMarca()">+</button></div>
    </div>
    <div class="card"><div class="section-hdr">Usuarios</div>${uH}
      <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="addUsuario()">+ Usuario</button>
    </div>
  </div>
  <div class="card" style="margin-top:14px">
    <div class="kpi-lbl">Empresa activa</div>
    <div style="font-size:22px;font-weight:700;margin:4px 0">${S.empresa}</div>
    <div style="font-size:12px;color:var(--muted)">Usuario: ${S.currentUser?.nombre||'—'} · Rol: ${S.currentUser?.rol||'—'}</div>
  </div>`;
}
function addMarca(){const n=document.getElementById('nmarca')?.value.trim();if(!n){toast('Ingrese nombre',true);return}if(S.marcas.includes(n)){toast('Ya existe',true);return}S.marcas.push(n);saveData();render();toast('✓ Marca agregada')}
function addUsuario(){S.usuarios.push({nombre:'Nuevo Usuario',pin:'0000',rol:'viewer'});saveData();render()}

// ═══════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboard(){
  const np=S.proyectos.length;
  const inv=S.proyectos.reduce((s,p)=>s+(parseFloat(p.montoObraCivil)||0),0);
  const enEj=S.proyectos.filter(p=>p.estado==='En ejecución').length;
  const fin=S.proyectos.filter(p=>p.estado==='Finalizado').length;
  const gtotal=S.gastos.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  let rows=np===0?`<tr><td colspan="5" class="empty">Sin proyectos — cree el primero →</td></tr>`:'';
  S.proyectos.forEach(p=>{
    const gp=totalGastosProyecto(p.id);
    rows+=`<tr>
      <td><div style="font-weight:600">${esc(p.nombre)}</div><div style="font-size:11px;color:var(--muted)">${esc(p.ubicacion||'Sin ubicación')}</div></td>
      <td>${esc(p.marca)}</td>
      <td>${badgeEst(p.estado)}</td>
      <td>
        <div class="prog"><div class="prog-fill" style="width:${p.avanceFisico}%"></div></div>
        <span style="font-size:11px;color:var(--muted)">${p.avanceFisico}%</span>
      </td>
      <td style="color:var(--red)">${fmt(gp)}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="verProy('${p.id}')">Ver →</button></td>
    </tr>`;
  });
  document.getElementById('content').innerHTML=`
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">Proyectos</div><div class="kpi-val">${np}</div></div>
    <div class="kpi"><div class="kpi-lbl">En Ejecución</div><div class="kpi-val" style="color:var(--accent)">${enEj}</div></div>
    <div class="kpi"><div class="kpi-lbl">Finalizados</div><div class="kpi-val" style="color:var(--green)">${fin}</div></div>
    <div class="kpi"><div class="kpi-lbl">Inv. Obra Civil</div><div class="kpi-val" style="font-size:18px">${fmt(inv)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Total Gastos</div><div class="kpi-val" style="font-size:18px;color:var(--red)">${fmt(gtotal)}</div></div>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Proyecto</th><th>Marca</th><th>Estado</th><th>Avance</th><th>Gastos</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderProyectos(){
  let rows=S.proyectos.length===0?`<tr><td colspan="6" class="empty">Sin proyectos registrados</td></tr>`:'';
  S.proyectos.forEach(p=>{
    const gp=totalGastosProyecto(p.id);
    rows+=`<tr>
      <td><div style="font-weight:600">${esc(p.nombre)}</div><div style="font-size:11px;color:var(--muted)">${esc(p.ubicacion||'Sin ubicación')}</div></td>
      <td>${esc(p.marca)}</td><td>${badgeEst(p.estado)}</td>
      <td><div class="prog"><div class="prog-fill" style="width:${p.avanceFisico}%"></div></div><span style="font-size:11px;color:var(--muted)">${p.avanceFisico}%</span></td>
      <td>${fmt(p.montoObraCivil)} <span style="color:var(--red);font-size:11px">+${fmt(gp)}</span></td>
      <td class="td-actions">
        <button class="btn btn-secondary btn-sm" onclick="verProy('${p.id}')">Ver →</button>
        <button class="btn btn-danger btn-sm" onclick="elimProyecto('${p.id}')">🗑</button>
      </td>
    </tr>`;
  });
  document.getElementById('content').innerHTML=`
  <div class="tbl-wrap"><table>
    <thead><tr><th>Proyecto</th><th>Marca</th><th>Estado</th><th>Avance</th><th>OC + Gastos</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ═══════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════
const NAV=[
  {id:'dashboard',label:'Dashboard',ic:'📊'},
  {id:'proyectos',label:'Proyectos',ic:'🏗'},
  {id:'gastos',label:'Gastos',ic:'🧾'},
  {id:'proveedores',label:'Proveedores',ic:'🤝'},
  {id:'centros',label:'Centros de Costo',ic:'📁'},
  {id:'config',label:'Configuración',ic:'⚙'},
];

function render(){
  if(window.innerWidth<=800)closeSB();
  document.getElementById('nav').innerHTML=NAV.map(n=>`
    <div class="nav-item ${S.activeTab===n.id?'active':''}" onclick="goTab('${n.id}')">
      <span class="ni">${n.ic}</span><span>${n.label}</span>
    </div>`).join('');
  const titles={dashboard:'Dashboard',proyectos:'Proyectos',gastos:'Gastos',proveedores:'Proveedores',centros:'Centros de Costo',config:'Configuración'};
  document.getElementById('pageTitle').textContent=titles[S.activeTab]||S.activeTab;
  const ha=document.getElementById('headerActions');
  ha.innerHTML=(S.activeTab==='proyectos'||S.activeTab==='dashboard')
    ?`<button class="btn btn-primary" onclick="openModal('modalNP');refreshMarcaSel()">+ Nuevo Proyecto</button>`:'';
  if(S.activeTab==='dashboard')renderDashboard();
  else if(S.activeTab==='proyectos')renderProyectos();
  else if(S.activeTab==='gastos')renderGastos();
  else if(S.activeTab==='proveedores')renderProveedores();
  else if(S.activeTab==='centros')renderCentros();
  else if(S.activeTab==='config')renderConfig();
}

function goTab(t){S.activeTab=t;render()}
</script>
</body>
</html>
