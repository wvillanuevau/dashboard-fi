<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Proyectos Pro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Karla',sans-serif;background:#0e0d0b;color:#e8e6e1}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:#1a1815;border-right:1px solid #2a2824;padding:20px;position:fixed;height:100vh;overflow-y:auto;transition:transform 0.3s}
.main{flex:1;margin-left:260px;padding:20px;transition:margin 0.3s}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#e8a020;margin-bottom:10px}
.nav-item{padding:10px;margin:5px 0;cursor:pointer;border-radius:8px}
.nav-item:hover{background:#25221e}
.nav-item.active{background:#e8a020;color:#000}
.btn{padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-weight:bold}
.btn-primary{background:#e8a020;color:#000}
.btn-secondary{background:#25221e;color:#fff;border:1px solid #3a3a3a}
.btn-danger{background:#2a0f0f;color:#e84040}
.btn-sm{padding:4px 10px;font-size:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.open{display:flex}
.modal-content{background:#1a1815;padding:24px;border-radius:16px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;color:#aaa}
input,select,textarea{width:100%;padding:10px;background:#25221e;border:1px solid #3a3a3a;border-radius:8px;color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#1a1815;padding:20px;border-radius:16px;border:1px solid #2a2824}
.stat-label{font-size:12px;color:#aaa;text-transform:uppercase}
.stat-value{font-size:28px;font-weight:700;font-family:monospace}
.tabs{display:flex;gap:4px;border-bottom:1px solid #2a2824;margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 20px;cursor:pointer;color:#aaa}
.tab.active{color:#e8a020;border-bottom:2px solid #e8a020}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #2a2824}
.progress-bar{height:6px;background:#2a2824;border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#2db87a;width:0%}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:#0d2a1a;color:#2db87a}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1815;border-left:3px solid #2db87a;padding:12px 20px;border-radius:8px;display:none;z-index:2000}
.hamburger{display:none;position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:#e8a020;border:none;font-size:24px;z-index:1000;cursor:pointer}
.loading{opacity:0.6;pointer-events:none}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);position:fixed;z-index:1001}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
}
</style>
</head>
<body>
<!-- Contenedor principal que nunca se destruye -->
<div id="appContainer" class="app" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="logo">📊 Proyectos Pro</div>
    <div style="font-size:12px;color:#888;margin-bottom:20px">Dashboard de Control</div>
    <div id="nav"></div>
    <div style="margin-top:30px"><button class="btn btn-secondary" style="width:100%" onclick="logout()">🚪 Cerrar sesión</button></div>
  </div>
  <div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 id="pageTitle">Dashboard</h2>
      <button class="btn btn-primary" onclick="openModal('newProjectModal')">+ Nuevo proyecto</button>
    </div>
    <div id="content"></div>
  </div>
</div>
<button class="hamburger" id="hamburgerBtn">☰</button>
<div id="toast" class="toast"></div>

<!-- Pantalla de login (se muestra/oculta, no se destruye) -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0e0d0b;padding:20px">
  <div style="background:#1a1815;padding:40px;border-radius:24px;max-width:400px;text-align:center">
    <div style="font-size:28px;font-weight:800;color:#e8a020;margin-bottom:8px">📊 Proyectos Pro</div>
    <div style="margin-bottom:32px;color:#aaa">Dashboard de Control</div>
    <div class="form-group"><label>Código de Empresa</label><input id="empresaCode" placeholder="Ej: DEMO01"></div>
    <button class="btn btn-primary" style="width:100%" onclick="checkEmpresa()">Continuar</button>
    <div id="userPanel" style="margin-top:20px;display:none"></div>
  </div>
</div>

<!-- MODALES -->
<div id="newProjectModal" class="modal">
  <div class="modal-content">
    <h3>Nuevo Proyecto</h3>
    <div class="form-group"><label>Nombre</label><input id="projNombre"></div>
    <div class="form-group"><label>Marca</label><select id="projMarca"></select></div>
    <div class="form-group"><label>Tipo</label><select id="projTipo"><option>Remodelación</option><option>Construcción nueva</option></select></div>
    <div class="form-group"><label>Ubicación</label><input id="projUbicacion"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="crearProyecto()">Crear</button>
    </div>
  </div>
</div>

<div id="projectDetailModal" class="modal">
  <div class="modal-content" style="max-width:700px">
    <div id="projectDetailContent"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeModal('projectDetailModal')">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ==================== ESTADO GLOBAL ====================
let STATE = {
  empresa: "DEMO",
  proyectos: [],
  gastos: [],
  proveedores: [],
  centrosCosto: [],
  marcas: ["Papa Johns", "Jimmy Johns"],
  usuarios: [{ nombre: "Admin", pin: "1234", rol: "admin" }],
  activeTab: "dashboard",
  currentProjectId: null
};

// Elementos DOM fijos
const appContainer = document.getElementById("appContainer");
const loginScreen = document.getElementById("loginScreen");
const hamburgerBtn = document.getElementById("hamburgerBtn");
const sidebar = document.getElementById("sidebar");

// ==================== INICIALIZACIÓN Y PERSISTENCIA ====================
function loadData() {
  const saved = localStorage.getItem(`proyectos_${STATE.empresa}`);
  if (saved) {
    const data = JSON.parse(saved);
    STATE.proyectos = data.proyectos || [];
    STATE.gastos = data.gastos || [];
    STATE.proveedores = data.proveedores || [];
    STATE.centrosCosto = data.centrosCosto || [];
    STATE.marcas = data.marcas || ["Papa Johns", "Jimmy Johns"];
    STATE.usuarios = data.usuarios || [{ nombre: "Admin", pin: "1234", rol: "admin" }];
  } else {
    STATE.proyectos = [];
    STATE.gastos = [];
    STATE.proveedores = [{ id: "1", nombre: "Proveedor Ejemplo", tipo: "General" }];
    STATE.centrosCosto = [{ id: "1", nombre: "Oficina Central" }];
  }
  // Actualizar selects que ya existen
  const marcaSelect = document.getElementById("projMarca");
  if (marcaSelect) marcaSelect.innerHTML = STATE.marcas.map(m => `<option>${m}</option>`).join("");
}

function saveData() {
  const data = {
    proyectos: STATE.proyectos,
    gastos: STATE.gastos,
    proveedores: STATE.proveedores,
    centrosCosto: STATE.centrosCosto,
    marcas: STATE.marcas,
    usuarios: STATE.usuarios
  };
  localStorage.setItem(`proyectos_${STATE.empresa}`, JSON.stringify(data));
}

// ==================== UTILIDADES ====================
function toast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderLeftColor = isError ? "#e84040" : "#2db87a";
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

function fmt(n) {
  return "$" + (parseFloat(n) || 0).toLocaleString("en-US", { minimumFractionDigits: 2 });
}

function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function toggleSidebar() {
  sidebar.classList.toggle("open");
}
hamburgerBtn.onclick = toggleSidebar;

// Cerrar sidebar al hacer clic en un elemento del nav (mobile)
function closeSidebarOnMobile() {
  if (window.innerWidth <= 768) sidebar.classList.remove("open");
}

// ==================== PROYECTOS ====================
function crearProyecto() {
  const nombre = document.getElementById("projNombre").value.trim();
  if (!nombre) { toast("Ingrese nombre", true); return; }
  const nuevo = {
    id: Date.now(),
    nombre: nombre,
    marca: document.getElementById("projMarca").value,
    tipo: document.getElementById("projTipo").value,
    ubicacion: document.getElementById("projUbicacion").value,
    estado: "Sin iniciar",
    avanceFisico: 0,
    montoObraCivil: 0,
    pagos: { a1: { paid: false, pct: 65 }, a2: { paid: false, pct: 25 }, pf: { paid: false, pct: 10 }, imp: { monto: 0, paid: false } },
    planos: { dwg: [], pdf: [], renders: [] },
    cronograma: [{ id: "p1", nombre: "Obra base", dias: 5, sub: [] }],
    fechaInicio: "", fechaFin: "", contratista: "", supervisor: "", responsable: "", observaciones: ""
  };
  STATE.proyectos.push(nuevo);
  saveData();
  closeModal("newProjectModal");
  render();
  toast("✓ Proyecto creado");
}

function eliminarProyecto(id) {
  if (!confirm("¿Eliminar proyecto?")) return;
  STATE.proyectos = STATE.proyectos.filter(p => p.id != id);
  saveData();
  render();
  toast("✓ Proyecto eliminado");
  closeModal("projectDetailModal");
}

function actualizarProyecto(id, campo, valor) {
  const p = STATE.proyectos.find(p => p.id == id);
  if (p) { p[campo] = valor; saveData(); render(); }
}

function actualizarPago(id, tipo, campo, valor) {
  const p = STATE.proyectos.find(p => p.id == id);
  if (p && p.pagos[tipo]) { p.pagos[tipo][campo] = valor; saveData(); renderProyectoDetalle(id); }
}

function actualizarPorcentajePago(id, tipo, pct) {
  const p = STATE.proyectos.find(p => p.id == id);
  if (p && p.pagos[tipo]) { p.pagos[tipo].pct = parseFloat(pct); saveData(); renderProyectoDetalle(id); }
}

function verProyecto(id) {
  STATE.currentProjectId = id;
  renderProyectoDetalle(id);
  openModal("projectDetailModal");
}

function renderProyectoDetalle(id) {
  const p = STATE.proyectos.find(p => p.id == id);
  if (!p) return;
  const container = document.getElementById("projectDetailContent");
  container.innerHTML = `
    <h3>${p.nombre}</h3>
    <div class="tabs" id="detailTabs">
      <div class="tab active" data-tab="general">General</div>
      <div class="tab" data-tab="planos">Planos</div>
      <div class="tab" data-tab="pagos">Pagos</div>
      <div class="tab" data-tab="cronograma">Cronograma</div>
    </div>
    <div id="detailPanel">${renderGeneral(p)}</div>
  `;
  // Vincular eventos de tabs
  document.querySelectorAll("#detailTabs .tab").forEach(tab => {
    tab.onclick = (e) => {
      document.querySelectorAll("#detailTabs .tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const tipo = tab.getAttribute("data-tab");
      const panel = document.getElementById("detailPanel");
      if (tipo === "general") panel.innerHTML = renderGeneral(p);
      else if (tipo === "planos") panel.innerHTML = renderPlanos(p);
      else if (tipo === "pagos") panel.innerHTML = renderPagos(p);
      else if (tipo === "cronograma") panel.innerHTML = renderCronograma(p, id);
    };
  });
}

function renderGeneral(p) {
  return `
    <div class="form-group"><label>Nombre</label><input value="${p.nombre}" onchange="actualizarProyecto(${p.id},'nombre',this.value)"></div>
    <div class="form-group"><label>Marca</label><select onchange="actualizarProyecto(${p.id},'marca',this.value)">${STATE.marcas.map(m => `<option ${p.marca===m?"selected":""}>${m}</option>`).join("")}</select></div>
    <div class="form-group"><label>Tipo</label><select onchange="actualizarProyecto(${p.id},'tipo',this.value)"><option ${p.tipo==="Remodelación"?"selected":""}>Remodelación</option><option ${p.tipo==="Construcción nueva"?"selected":""}>Construcción nueva</option></select></div>
    <div class="form-group"><label>Ubicación</label><input value="${p.ubicacion || ""}" onchange="actualizarProyecto(${p.id},'ubicacion',this.value)"></div>
    <div class="form-group"><label>Estado</label><select onchange="actualizarProyecto(${p.id},'estado',this.value)"><option ${p.estado==="Sin iniciar"?"selected":""}>Sin iniciar</option><option ${p.estado==="En ejecución"?"selected":""}>En ejecución</option><option ${p.estado==="Retrasado"?"selected":""}>Retrasado</option><option ${p.estado==="Finalizado"?"selected":""}>Finalizado</option></select></div>
    <div class="form-group"><label>% Avance</label><input type="range" min="0" max="100" value="${p.avanceFisico}" oninput="this.nextElementSibling.innerText=this.value+'%'" onchange="actualizarProyecto(${p.id},'avanceFisico',parseInt(this.value))"><span>${p.avanceFisico}%</span></div>
    <div class="form-group"><label>Monto Obra Civil</label><input type="number" value="${p.montoObraCivil}" onchange="actualizarProyecto(${p.id},'montoObraCivil',parseFloat(this.value))"></div>
    <div class="form-group"><label>Contratista</label><input value="${p.contratista || ""}" onchange="actualizarProyecto(${p.id},'contratista',this.value)"></div>
    <div class="form-group"><label>Supervisor</label><input value="${p.supervisor || ""}" onchange="actualizarProyecto(${p.id},'supervisor',this.value)"></div>
    <div class="form-group"><label>Observaciones</label><textarea rows="3" onchange="actualizarProyecto(${p.id},'observaciones',this.value)">${p.observaciones || ""}</textarea></div>
    <button class="btn btn-danger" onclick="eliminarProyecto(${p.id})">Eliminar proyecto</button>
  `;
}

function renderPlanos(p) {
  return `<p>Subida de archivos DWG, PDF y renders.</p>
    <button class="btn btn-secondary" onclick="alert('Función de subida de archivos (mock)')">Subir plano</button>`;
}

function renderPagos(p) {
  const montoOC = p.montoObraCivil || 0;
  const a1 = montoOC * (p.pagos.a1.pct/100);
  const a2 = montoOC * (p.pagos.a2.pct/100);
  const pf = montoOC * (p.pagos.pf.pct/100);
  return `
    <div class="stat-card"><div class="stat-label">Obra Civil</div><div class="stat-value">${fmt(montoOC)}</div></div>
    <div style="margin-top:16px">
      <label>1er Anticipo (%): <input type="number" step="1" value="${p.pagos.a1.pct}" onchange="actualizarPorcentajePago(${p.id},'a1',this.value)" style="width:70px"></label>
      <div><label><input type="checkbox" ${p.pagos.a1.paid?"checked":""} onchange="actualizarPago(${p.id},'a1','paid',this.checked)"> Pagado - Monto: ${fmt(a1)}</label></div>
    </div>
    <div>
      <label>2do Anticipo (%): <input type="number" step="1" value="${p.pagos.a2.pct}" onchange="actualizarPorcentajePago(${p.id},'a2',this.value)" style="width:70px"></label>
      <div><label><input type="checkbox" ${p.pagos.a2.paid?"checked":""} onchange="actualizarPago(${p.id},'a2','paid',this.checked)"> Pagado - Monto: ${fmt(a2)}</label></div>
    </div>
    <div>
      <label>Pago Final (%): <input type="number" step="1" value="${p.pagos.pf.pct}" onchange="actualizarPorcentajePago(${p.id},'pf',this.value)" style="width:70px"></label>
      <div><label><input type="checkbox" ${p.pagos.pf.paid?"checked":""} onchange="actualizarPago(${p.id},'pf','paid',this.checked)"> Pagado - Monto: ${fmt(pf)}</label></div>
    </div>
    <div>
      <label>Imprevistos: $<input type="number" value="${p.pagos.imp.monto}" onchange="actualizarPago(${p.id},'imp','monto',parseFloat(this.value))"></label>
      <label><input type="checkbox" ${p.pagos.imp.paid?"checked":""} onchange="actualizarPago(${p.id},'imp','paid',this.checked)"> Pagado</label>
    </div>
  `;
}

function renderCronograma(p, proyId) {
  let html = `<div class="stats-grid"><div class="stat-card"><div class="stat-label">Días totales</div><div class="stat-value">${p.cronograma.reduce((s,m)=>s+(m.dias||0),0)}</div></div></div>
  <div class="table-wrap"><table><thead><tr><th>Partida</th><th>Días</th><th>Subpartidas</th><th></th></tr></thead><tbody>`;
  p.cronograma.forEach((m, idx) => {
    html += `<tr><td><input value="${m.nombre}" data-idx="${idx}" data-field="nombre" class="crono-edit" style="width:100%"></td>
    <td><input type="number" value="${m.dias}" data-idx="${idx}" data-field="dias" class="crono-edit" style="width:70px"></td>
    <td>${(m.sub||[]).length}</td>
    <td><button class="btn btn-secondary btn-sm" data-idx="${idx}" onclick="agregarSubpartida(${proyId},${idx})">+ Sub</button></td></tr>`;
    (m.sub||[]).forEach((s, si) => {
      html += `<tr style="background:#25221e"><td style="padding-left:30px"><input type="checkbox" ${s.done?"checked":""} data-midx="${idx}" data-sidx="${si}" data-field="done" class="sub-check"> <input value="${s.desc||""}" placeholder="Descripción" data-midx="${idx}" data-sidx="${si}" data-field="desc" class="sub-edit" style="width:150px"></td>
      <td><input type="number" value="${s.dias||1}" data-midx="${idx}" data-sidx="${si}" data-field="dias" class="sub-edit" style="width:60px"></td>
      <td colspan="2"><input type="number" placeholder="Cantidad" value="${s.cantidad||0}" data-midx="${idx}" data-sidx="${si}" data-field="cantidad" class="sub-edit" style="width:80px"> x <input type="number" placeholder="Precio" value="${s.precio||0}" data-midx="${idx}" data-sidx="${si}" data-field="precio" class="sub-edit" style="width:80px"> = <strong>${fmt((s.cantidad||0)*(s.precio||0))}</strong><button class="btn btn-sm btn-danger" style="margin-left:8px" data-midx="${idx}" data-sidx="${si}" onclick="eliminarSubpartida(${proyId},${idx},${si})">✕</button></td></tr>`;
    });
  });
  html += `</tbody></table></div><button class="btn btn-primary" onclick="agregarPartida(${proyId})">+ Agregar Partida</button>`;
  // Delegar eventos después de inyectar el HTML
  setTimeout(() => {
    document.querySelectorAll(".crono-edit").forEach(el => {
      el.onchange = (e) => {
        const idx = parseInt(el.dataset.idx);
        const field = el.dataset.field;
        let val = el.value;
        if (field === "dias") val = parseInt(val) || 0;
        actualizarPartida(proyId, idx, field, val);
      };
    });
    document.querySelectorAll(".sub-edit").forEach(el => {
      el.onchange = (e) => {
        const midx = parseInt(el.dataset.midx);
        const sidx = parseInt(el.dataset.sidx);
        const field = el.dataset.field;
        let val = el.value;
        if (field === "dias" || field === "cantidad" || field === "precio") val = parseFloat(val) || 0;
        actualizarSubpartida(proyId, midx, sidx, field, val);
      };
    });
    document.querySelectorAll(".sub-check").forEach(el => {
      el.onchange = (e) => {
        const midx = parseInt(el.dataset.midx);
        const sidx = parseInt(el.dataset.sidx);
        actualizarSubpartida(proyId, midx, sidx, "done", el.checked);
      };
    });
  }, 50);
  return html;
}

function actualizarPartida(proyId, idx, campo, val) {
  const p = STATE.proyectos.find(p => p.id == proyId);
  if (p && p.cronograma[idx]) { p.cronograma[idx][campo] = val; saveData(); renderProyectoDetalle(proyId); }
}
function actualizarSubpartida(proyId, midx, sidx, campo, val) {
  const p = STATE.proyectos.find(p => p.id == proyId);
  if (p && p.cronograma[midx] && p.cronograma[midx].sub[sidx]) { p.cronograma[midx].sub[sidx][campo] = val; saveData(); renderProyectoDetalle(proyId); }
}
function agregarPartida(proyId) {
  const p = STATE.proyectos.find(p => p.id == proyId);
  if (p) { p.cronograma.push({ id: "m"+Date.now(), nombre: "Nueva partida", dias: 5, sub: [] }); saveData(); renderProyectoDetalle(proyId); }
}
function agregarSubpartida(proyId, midx) {
  const p = STATE.proyectos.find(p => p.id == proyId);
  if (p && p.cronograma[midx]) { p.cronograma[midx].sub.push({ id: "s"+Date.now(), desc: "", cantidad: 0, precio: 0, dias: 3, done: false }); saveData(); renderProyectoDetalle(proyId); }
}
function eliminarSubpartida(proyId, midx, sidx) {
  const p = STATE.proyectos.find(p => p.id == proyId);
  if (p && p.cronograma[midx] && p.cronograma[midx].sub) { p.cronograma[midx].sub.splice(sidx,1); saveData(); renderProyectoDetalle(proyId); }
}

// ==================== GASTOS ====================
function renderGastos() {
  let total = STATE.gastos.reduce((s,g)=>s+(g.valor||0),0);
  let rows = "";
  for (let g of STATE.gastos.slice().reverse()) {
    rows += `<tr><td>${g.factura}</td><td>${g.descripcion}</td><td>${g.proveedor}</td><td>${fmt(g.valor)}</td><td>${g.fecha}</td><td><button class="btn btn-sm btn-danger" onclick="eliminarGasto('${g.id}')">✕</button></td></tr>`;
  }
  document.getElementById("content").innerHTML = `
    <div class="stats-grid"><div class="stat-card"><div class="stat-label">Total Gastos</div><div class="stat-value">${fmt(total)}</div></div></div>
    <div class="form-group"><label>Factura</label><input id="gastoFactura"></div>
    <div class="form-group"><label>Proveedor</label><select id="gastoProveedor"><option value="">-- Seleccionar --</option>${STATE.proveedores.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join("")}</select></div>
    <div class="form-group"><label>Valor</label><input type="number" id="gastoValor"></div>
    <div class="form-group"><label>Descripción</label><input id="gastoDesc"></div>
    <div class="form-group"><label>Fecha</label><input type="date" id="gastoFecha" value="${new Date().toISOString().slice(0,10)}"></div>
    <button class="btn btn-primary" onclick="registrarGasto()">+ Registrar</button>
    <div class="table-wrap"><table><thead><tr><th>Factura</th><th>Descripción</th><th>Proveedor</th><th>Valor</th><th>Fecha</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  `;
}
function registrarGasto() {
  const factura = document.getElementById("gastoFactura").value.trim();
  const provId = document.getElementById("gastoProveedor").value;
  const valor = parseFloat(document.getElementById("gastoValor").value) || 0;
  const desc = document.getElementById("gastoDesc").value.trim();
  const fecha = document.getElementById("gastoFecha").value;
  if (!factura || !provId || !valor) { toast("Complete campos", true); return; }
  if (STATE.gastos.some(g => g.factura === factura)) { toast("Factura ya registrada", true); return; }
  const prov = STATE.proveedores.find(p => p.id === provId);
  STATE.gastos.push({ id: "g"+Date.now(), factura, descripcion: desc, proveedor: prov ? prov.nombre : "", valor, fecha });
  saveData();
  render();
  toast("✓ Gasto registrado");
}
function eliminarGasto(id) { STATE.gastos = STATE.gastos.filter(g => g.id !== id); saveData(); render(); }

// ==================== PROVEEDORES ====================
function renderProveedores() {
  let rows = "";
  for (let p of STATE.proveedores) {
    rows += `<tr><td>${p.nombre}</td><td>${p.tipo || "—"}</td><td>${p.telefono || "—"}</td><td><button class="btn btn-sm btn-danger" onclick="eliminarProveedor('${p.id}')">✕</button></td></tr>`;
  }
  document.getElementById("content").innerHTML = `
    <div class="form-group"><label>Nombre</label><input id="provNombre"></div>
    <div class="form-group"><label>Tipo</label><input id="provTipo"></div>
    <div class="form-group"><label>Teléfono</label><input id="provTelefono"></div>
    <button class="btn btn-primary" onclick="registrarProveedor()">+ Registrar</button>
    <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Tipo</th><th>Teléfono</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  `;
}
function registrarProveedor() {
  const nombre = document.getElementById("provNombre").value.trim();
  if (!nombre) { toast("Nombre requerido", true); return; }
  if (STATE.proveedores.some(p => p.nombre.toLowerCase() === nombre.toLowerCase())) { toast("Proveedor ya existe", true); return; }
  STATE.proveedores.push({ id: "pv"+Date.now(), nombre, tipo: document.getElementById("provTipo").value, telefono: document.getElementById("provTelefono").value });
  saveData();
  render();
  toast("✓ Proveedor registrado");
}
function eliminarProveedor(id) { STATE.proveedores = STATE.proveedores.filter(p => p.id !== id); saveData(); render(); }

// ==================== CENTROS DE COSTO ====================
function renderCentrosCosto() {
  let rows = "";
  for (let c of STATE.centrosCosto) {
    rows += `<tr><td>${c.nombre}</td><td>${c.descripcion || "—"}</td><td><button class="btn btn-sm btn-danger" onclick="eliminarCentroCosto('${c.id}')">✕</button></td></tr>`;
  }
  document.getElementById("content").innerHTML = `
    <div class="form-group"><label>Nombre</label><input id="ccNombre"></div>
    <div class="form-group"><label>Descripción</label><input id="ccDesc"></div>
    <button class="btn btn-primary" onclick="registrarCentroCosto()">+ Agregar</button>
    <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Descripción</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  `;
}
function registrarCentroCosto() {
  const nombre = document.getElementById("ccNombre").value.trim();
  if (!nombre) { toast("Nombre requerido", true); return; }
  if (STATE.centrosCosto.some(c => c.nombre.toLowerCase() === nombre.toLowerCase())) { toast("Ya existe", true); return; }
  STATE.centrosCosto.push({ id: "cc"+Date.now(), nombre, descripcion: document.getElementById("ccDesc").value });
  saveData();
  render();
  toast("✓ Centro de costo agregado");
}
function eliminarCentroCosto(id) { STATE.centrosCosto = STATE.centrosCosto.filter(c => c.id !== id); saveData(); render(); }

// ==================== CONFIGURACIÓN ====================
function renderConfig() {
  let marcasHtml = "";
  for (let i=0; i<STATE.marcas.length; i++) {
    marcasHtml += `<div style="display:flex;gap:8px;margin:8px 0"><input value="${STATE.marcas[i]}" onchange="actualizarMarca(${i},this.value)"><button class="btn btn-sm btn-danger" onclick="eliminarMarca(${i})">✕</button></div>`;
  }
  let usuariosHtml = "";
  for (let i=0; i<STATE.usuarios.length; i++) {
    usuariosHtml += `<div style="display:flex;gap:8px;margin:8px 0"><input value="${STATE.usuarios[i].nombre}" onchange="actualizarUsuario(${i},'nombre',this.value)"><input type="password" value="${STATE.usuarios[i].pin}" style="width:80px" onchange="actualizarUsuario(${i},'pin',this.value)"><button class="btn btn-sm btn-danger" onclick="eliminarUsuario(${i})">✕</button></div>`;
  }
  document.getElementById("content").innerHTML = `
    <div class="stats-grid"><div class="stat-card"><div class="stat-label">Marcas</div>${marcasHtml}<div style="margin-top:12px"><input id="nuevaMarca" placeholder="Nueva marca"><button class="btn btn-primary btn-sm" onclick="agregarMarca()">+</button></div></div>
    <div class="stat-card"><div class="stat-label">Usuarios</div>${usuariosHtml}<button class="btn btn-primary btn-sm" onclick="agregarUsuario()">+ Usuario</button></div></div>
  `;
}
function actualizarMarca(idx, val) { STATE.marcas[idx] = val; saveData(); render(); }
function agregarMarca() { const n = document.getElementById("nuevaMarca").value.trim(); if (n && !STATE.marcas.includes(n)) { STATE.marcas.push(n); saveData(); render(); toast("Marca agregada"); } }
function eliminarMarca(idx) { STATE.marcas.splice(idx,1); saveData(); render(); }
function actualizarUsuario(idx, campo, val) { STATE.usuarios[idx][campo] = val; saveData(); }
function agregarUsuario() { STATE.usuarios.push({ nombre: "Nuevo", pin: "0000", rol: "viewer" }); saveData(); render(); }
function eliminarUsuario(idx) { STATE.usuarios.splice(idx,1); saveData(); render(); }

// ==================== RENDER PRINCIPAL ====================
function render() {
  const nav = document.getElementById("nav");
  const items = [
    { id: "dashboard", label: "Dashboard" },
    { id: "proyectos", label: "Proyectos" },
    { id: "gastos", label: "Gastos" },
    { id: "proveedores", label: "Proveedores" },
    { id: "centros", label: "Centros de Costo" },
    { id: "config", label: "Configuración" }
  ];
  nav.innerHTML = items.map(i => `<div class="nav-item ${STATE.activeTab===i.id?"active":""}" onclick="goTab('${i.id}')">${i.label}</div>`).join("");
  document.getElementById("pageTitle").innerHTML = STATE.activeTab.charAt(0).toUpperCase() + STATE.activeTab.slice(1);
  // Cerrar sidebar en móvil al navegar
  closeSidebarOnMobile();
  if (STATE.activeTab === "dashboard") renderDashboard();
  else if (STATE.activeTab === "proyectos") renderProyectos();
  else if (STATE.activeTab === "gastos") renderGastos();
  else if (STATE.activeTab === "proveedores") renderProveedores();
  else if (STATE.activeTab === "centros") renderCentrosCosto();
  else if (STATE.activeTab === "config") renderConfig();
}

function renderDashboard() {
  const total = STATE.proyectos.length;
  const inversion = STATE.proyectos.reduce((s,p)=>s+(p.montoObraCivil||0),0);
  let html = `<div class="stats-grid"><div class="stat-card"><div class="stat-label">Proyectos</div><div class="stat-value">${total}</div></div><div class="stat-card"><div class="stat-label">Inversión Total</div><div class="stat-value">${fmt(inversion)}</div></div></div>
  <div class="table-wrap"><table><thead><tr><th>Proyecto</th><th>Marca</th><th>Estado</th><th>Avance</th><th></th></tr></thead><tbody>`;
  for (let p of STATE.proyectos) {
    html += `<tr><td>${p.nombre}</td><td>${p.marca}</td><td>${p.estado}</td><td><div class="progress-bar"><div class="progress-fill" style="width:${p.avanceFisico}%"></div></div>${p.avanceFisico}%</td><td><button class="btn btn-sm btn-primary" onclick="verProyecto(${p.id})">Ver</button></td></tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById("content").innerHTML = html;
}

function renderProyectos() {
  let html = `<div class="table-wrap"><table><thead><tr><th>Proyecto</th><th>Marca</th><th>Estado</th><th>Avance</th><th>Monto</th><th></th></tr></thead><tbody>`;
  for (let p of STATE.proyectos) {
    html += `<tr><td>${p.nombre}</td><td>${p.marca}</td><td>${p.estado}</td><td><div class="progress-bar"><div class="progress-fill" style="width:${p.avanceFisico}%"></div></div>${p.avanceFisico}%</td><td>${fmt(p.montoObraCivil)}</td><td><button class="btn btn-sm btn-primary" onclick="verProyecto(${p.id})">Ver</button> <button class="btn btn-sm btn-danger" onclick="eliminarProyecto(${p.id})">Eliminar</button></td></tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById("content").innerHTML = html;
}

function goTab(tab) { STATE.activeTab = tab; render(); }

// ==================== LOGIN CORREGIDO ====================
let loginUserIndex = null;
let pinInput = "";

function checkEmpresa() {
  const code = document.getElementById("empresaCode").value.trim().toUpperCase();
  if (!code) { toast("Ingrese código", true); return; }
  STATE.empresa = code;
  loadData();
  const userPanel = document.getElementById("userPanel");
  userPanel.style.display = "block";
  let html = "";
  for (let i=0; i<STATE.usuarios.length; i++) {
    html += `<div style="padding:12px;background:#25221e;margin:8px 0;border-radius:8px;cursor:pointer" onclick="seleccionarUsuario(${i})"><strong>${STATE.usuarios[i].nombre}</strong> (${STATE.usuarios[i].rol})</div>`;
  }
  html += `<div><div id="pinDots" style="display:flex;justify-content:center;gap:12px;margin:20px 0"></div><div id="pinKeypad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px"></div><div id="loginError" style="color:#e84040;margin-top:10px"></div></div>`;
  userPanel.innerHTML = html;
  generarPinKeypad();
  loginUserIndex = null;
  pinInput = "";
}

function seleccionarUsuario(idx) { loginUserIndex = idx; pinInput = ""; actualizarPinDots(); document.getElementById("loginError").innerHTML = ""; }

function actualizarPinDots() {
  const dots = document.getElementById("pinDots");
  if (!dots) return;
  let html = "";
  for (let i=0; i<4; i++) {
    html += `<div style="width:14px;height:14px;border-radius:50%;background:${i<pinInput.length?"#e8a020":"#2a2824"};margin:0 4px"></div>`;
  }
  dots.innerHTML = html;
}

function generarPinKeypad() {
  const pad = document.getElementById("pinKeypad");
  if (!pad) return;
  pad.innerHTML = "";
  for (let i=1;i<=9;i++) {
    const b = document.createElement("button");
    b.textContent = i;
    b.className = "btn btn-secondary";
    b.style.padding = "16px";
    b.onclick = () => ingresarPin(i.toString());
    pad.appendChild(b);
  }
  const zero = document.createElement("button");
  zero.textContent = "0";
  zero.className = "btn btn-secondary";
  zero.style.padding = "16px";
  zero.onclick = () => ingresarPin("0");
  pad.appendChild(zero);
  const del = document.createElement("button");
  del.textContent = "⌫";
  del.className = "btn btn-secondary";
  del.style.padding = "16px";
  del.onclick = () => ingresarPin("del");
  pad.appendChild(del);
}

function ingresarPin(k) {
  if (loginUserIndex === null) { document.getElementById("loginError").innerHTML = "Primero selecciona un usuario"; return; }
  if (k === "del") pinInput = pinInput.slice(0,-1);
  else if (pinInput.length < 4) pinInput += k;
  actualizarPinDots();
  if (pinInput.length === 4) verificarPin();
}

function verificarPin() {
  if (loginUserIndex === null) { document.getElementById("loginError").innerHTML = "Seleccione usuario"; return; }
  if (pinInput === STATE.usuarios[loginUserIndex].pin) {
    // Login exitoso: ocultar login, mostrar app
    loginScreen.style.display = "none";
    appContainer.style.display = "flex";
    render();
    toast("Bienvenido");
  } else {
    document.getElementById("loginError").innerHTML = "PIN incorrecto";
    pinInput = "";
    actualizarPinDots();
  }
}

function logout() {
  appContainer.style.display = "none";
  loginScreen.style.display = "flex";
  // Limpiar campos de login
  document.getElementById("empresaCode").value = "";
  document.getElementById("userPanel").style.display = "none";
  loginUserIndex = null;
  pinInput = "";
}

// ==================== INICIO ====================

document.addEventListener("DOMContentLoaded", () => {
  // Cargar marcas por si el usuario abre el modal antes de login? No, el modal solo se abre después de login.
  // Pero para evitar errores, inicializamos vacío.
});
</script>
