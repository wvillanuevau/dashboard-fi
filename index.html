<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Proyectos Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Karla',sans-serif;background:#0e0d0b;color:#e8e6e1}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:260px;background:#1a1815;border-right:1px solid #2a2824;padding:20px;position:fixed;height:100vh;overflow-y:auto;z-index:500;transition:transform .3s;display:flex;flex-direction:column}
.main{flex:1;margin-left:260px;padding:24px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400}
.overlay.open{display:block}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#e8a020;margin-bottom:2px}
.logo-sub{font-size:12px;color:#666;margin-bottom:24px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;margin:2px 0;cursor:pointer;border-radius:10px;font-size:14px;color:#bbb;transition:background .15s,color .15s}
.nav-item:hover{background:#25221e;color:#e8e6e1}
.nav-item.active{background:#e8a020;color:#000;font-weight:700}
.nav-bottom{margin-top:auto;padding-top:20px}

/* BOTONES */
.btn{padding:9px 18px;border-radius:9px;cursor:pointer;border:none;font-family:'Karla',sans-serif;font-weight:600;font-size:13px;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:#e8a020;color:#000}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:#25221e;color:#e8e6e1;border:1px solid #3a3a3a}
.btn-secondary:hover{background:#2e2b27}
.btn-danger{background:#2a0f0f;color:#e84040;border:1px solid #3a1515}
.btn-danger:hover{background:#3a1515}
.btn-sm{padding:5px 11px;font-size:12px}

/* HEADER */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}

/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#1a1815;padding:20px;border-radius:16px;border:1px solid #2a2824}
.stat-label{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;font-family:'Syne',sans-serif}

/* TABLA */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #2a2824}
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#777;background:#161412;border-bottom:1px solid #2a2824}
td{padding:11px 14px;border-bottom:1px solid #1e1c19;font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1c1a17}

/* FORMULARIOS */
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:5px;font-size:11px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;padding:10px 12px;background:#25221e;border:1px solid #3a3a3a;border-radius:9px;color:#e8e6e1;font-family:'Karla',sans-serif;font-size:14px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#e8a020}
input[type="range"]{padding:4px 0;background:none;border:none;cursor:pointer}
input[type="checkbox"]{width:auto;accent-color:#e8a020}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* PROGRESS */
.progress-bar{height:6px;background:#2a2824;border-radius:3px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:#2db87a;border-radius:3px;transition:width .4s ease}

/* BADGES */
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.badge-success{background:#0d2a1a;color:#2db87a}
.badge-warning{background:#2a1e0a;color:#e8a020}
.badge-danger{background:#2a0f0f;color:#e84040}
.badge-neutral{background:#25221e;color:#aaa}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal.open{display:flex}
.modal-content{background:#1a1815;padding:28px;border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid #2a2824}
.modal-content.wide{max-width:740px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid #2a2824;margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 16px;cursor:pointer;color:#777;font-size:13px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:#e8a020;border-bottom-color:#e8a020}
.tab:hover{color:#e8e6e1}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1c1a17;border-left:3px solid #2db87a;padding:12px 20px;border-radius:10px;font-size:14px;display:none;z-index:3000;box-shadow:0 4px 24px rgba(0,0,0,.5)}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0e0d0b;padding:20px}
.login-box{background:#1a1815;padding:40px;border-radius:24px;width:100%;max-width:400px;text-align:center;border:1px solid #2a2824}
.user-card{padding:14px 18px;background:#25221e;margin:8px 0;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:border-color .15s,background .15s;text-align:left}
.user-card:hover{background:#2e2b27}
.user-card.selected{border-color:#e8a020;background:#2a2519}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:20px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#2a2824;transition:background .15s}
.pin-dot.filled{background:#e8a020}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto}

/* HAMBURGER */
.hamburger{display:none;position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#e8a020;border:none;font-size:22px;z-index:600;cursor:pointer;box-shadow:0 4px 16px rgba(232,160,32,.4);align-items:center;justify-content:center}

.divider{border:none;border-top:1px solid #2a2824;margin:20px 0}
.empty-state{text-align:center;padding:48px;color:#555;font-size:14px}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px}
  .hamburger{display:flex}
  .stats-grid{grid-template-columns:1fr 1fr}
  .input-row{grid-template-columns:1fr}
  .modal-content{padding:20px}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div style="font-size:32px;margin-bottom:8px">📊</div>
    <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#e8a020;margin-bottom:4px">Proyectos Pro</div>
    <div style="font-size:13px;color:#666;margin-bottom:28px">Dashboard de Control</div>
    <div class="form-group" style="text-align:left">
      <label>Código de Empresa</label>
      <input id="empresaCode" placeholder="Ej: DEMO" onkeydown="if(event.key==='Enter')checkEmpresa()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="checkEmpresa()">Continuar →</button>
    <div id="userPanel" style="display:none;margin-top:24px"></div>
  </div>
</div>

<div id="appShell" style="display:none" class="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div>
      <div class="logo">📊 Proyectos Pro</div>
      <div class="logo-sub" id="empresaLabel">Dashboard</div>
      <nav id="nav"></nav>
    </div>
    <div class="nav-bottom">
      <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
  </div>
  <div class="main">
    <div class="page-header">
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div id="headerActions"></div>
    </div>
    <div id="content"></div>
  </div>
  <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>
</div>

<div id="toast" class="toast"></div>

<!-- MODAL NUEVO PROYECTO -->
<div id="newProjectModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">➕ Nuevo Proyecto</span>
      <button class="btn btn-secondary btn-sm" onclick="closeModal('newProjectModal')">✕</button>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Nombre *</label><input id="projNombre" placeholder="Ej: Local Centro Comercial"></div>
      <div class="form-group"><label>Marca *</label><select id="projMarca"></select></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Tipo</label>
        <select id="projTipo"><option>Remodelación</option><option>Construcción nueva</option></select>
      </div>
      <div class="form-group"><label>Ubicación</label><input id="projUbicacion" placeholder="Dirección o referencia"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="crearProyecto()">✓ Crear</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE PROYECTO -->
<div id="projectDetailModal" class="modal">
  <div class="modal-content wide">
    <div id="projectDetailContent"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('projectDetailModal')">Cerrar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ===================== ESTADO =====================
const S = {
  empresa:'DEMO', proyectos:[], gastos:[], proveedores:[], centrosCosto:[],
  marcas:['Papa Johns','Jimmy Johns'],
  usuarios:[{nombre:'Admin',pin:'1234',rol:'admin'}],
  activeTab:'dashboard', currentUser:null
};

// ===================== UTILS =====================
function toast(msg, err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.borderLeftColor=err?'#e84040':'#2db87a';
  t.style.display='block'; clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.display='none',3000);
}
function fmt(n){'$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return '$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toggleSidebar(){
  const s=document.getElementById('sidebar'),o=document.getElementById('overlay');
  const isOpen=s.classList.contains('open');
  if(isOpen){s.classList.remove('open');o.classList.remove('open');document.getElementById('hamburgerBtn').textContent='☰';}
  else{s.classList.add('open');o.classList.add('open');document.getElementById('hamburgerBtn').textContent='✕';}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('hamburgerBtn').textContent='☰';
}
function badgeEstado(e){
  const m={'Sin iniciar':'badge-neutral','En ejecución':'badge-warning','Retrasado':'badge-danger','Finalizado':'badge-success'};
  return `<span class="badge ${m[e]||'badge-neutral'}">${e}</span>`;
}

// ===================== STORAGE =====================
function loadData(){
  try{
    const raw=localStorage.getItem('pj_v2_'+S.empresa);
    if(raw){
      const d=JSON.parse(raw);
      S.proyectos=d.proyectos||[]; S.gastos=d.gastos||[];
      S.proveedores=d.proveedores||[]; S.centrosCosto=d.centrosCosto||[];
      S.marcas=d.marcas||['Papa Johns','Jimmy Johns'];
      S.usuarios=d.usuarios||[{nombre:'Admin',pin:'1234',rol:'admin'}];
    } else {
      S.proyectos=[]; S.gastos=[];
      S.proveedores=[{id:'1',nombre:'Proveedor Ejemplo',tipo:'General',telefono:''}];
      S.centrosCosto=[{id:'1',nombre:'Oficina Central',descripcion:''}];
    }
  }catch(e){toast('Error al cargar datos',true);}
}
function saveData(){
  try{
    localStorage.setItem('pj_v2_'+S.empresa,JSON.stringify({
      proyectos:S.proyectos,gastos:S.gastos,proveedores:S.proveedores,
      centrosCosto:S.centrosCosto,marcas:S.marcas,usuarios:S.usuarios
    }));
  }catch(e){toast('Error al guardar (almacenamiento lleno)',true);}
}
function refreshMarcaSelect(){
  const el=document.getElementById('projMarca');
  if(el) el.innerHTML=S.marcas.map(m=>`<option>${m}</option>`).join('');
}

// ===================== LOGIN =====================
let loginUserIdx=null, pinInput='';

function checkEmpresa(){
  const code=document.getElementById('empresaCode').value.trim().toUpperCase();
  if(!code){toast('Ingrese un código de empresa',true);return;}
  S.empresa=code; loadData();
  const panel=document.getElementById('userPanel');
  panel.style.display='block';
  let html='<div style="text-align:left;font-size:12px;color:#777;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Seleccione usuario</div>';
  S.usuarios.forEach((u,i)=>{
    html+=`<div class="user-card" id="uc${i}" onclick="seleccionarUsuario(${i})">
      <div style="font-weight:600">${u.nombre}</div>
      <div style="font-size:12px;color:#777">${u.rol}</div>
    </div>`;
  });
  html+=`<div style="margin-top:20px">
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-keypad" id="pinKeypad"></div>
    <div id="loginError" style="color:#e84040;font-size:13px;margin-top:10px;min-height:20px"></div>
  </div>`;
  panel.innerHTML=html;
  actualizarPinDots();
  generarPinKeypad();
}

function seleccionarUsuario(idx){
  loginUserIdx=idx; pinInput='';
  document.querySelectorAll('.user-card').forEach((c,i)=>c.classList.toggle('selected',i===idx));
  actualizarPinDots();
  document.getElementById('loginError').textContent='';
}

function actualizarPinDots(){
  const el=document.getElementById('pinDots');
  if(!el) return;
  el.innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinInput.length?'filled':''}"></div>`).join('');
}

function generarPinKeypad(){
  const pad=document.getElementById('pinKeypad');
  if(!pad) return;
  pad.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k=>{
    const b=document.createElement('button');
    b.className='btn btn-secondary'; b.style.cssText='padding:16px;font-size:18px;font-weight:700;justify-content:center';
    b.textContent=k===''?'':k;
    if(k!=='') b.onclick=()=>ingresarPin(k.toString());
    else b.disabled=true, b.style.opacity='0';
    pad.appendChild(b);
  });
}

function ingresarPin(k){
  if(loginUserIdx===null){document.getElementById('loginError').textContent='Seleccione un usuario primero';return;}
  if(k==='⌫') pinInput=pinInput.slice(0,-1);
  else if(pinInput.length<4) pinInput+=k;
  actualizarPinDots();
  if(pinInput.length===4) setTimeout(verificarPin,80);
}

function verificarPin(){
  const u=S.usuarios[loginUserIdx];
  if(pinInput===u.pin){
    S.currentUser=u;
    document.getElementById('loginScreen').style.display='none';
    const app=document.getElementById('appShell');
    app.style.display='flex';
    document.getElementById('empresaLabel').textContent=S.empresa;
    refreshMarcaSelect();
    S.activeTab='dashboard';
    render();
    toast('Bienvenido, '+u.nombre);
  } else {
    document.getElementById('loginError').textContent='PIN incorrecto';
    pinInput=''; actualizarPinDots();
  }
}

function logout(){
  S.currentUser=null; loginUserIdx=null; pinInput='';
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('userPanel').style.display='none';
  document.getElementById('empresaCode').value='';
  closeSidebar();
}

// ===================== PROYECTOS =====================
function crearProyecto(){
  const nombre=document.getElementById('projNombre').value.trim();
  if(!nombre){toast('Ingrese nombre del proyecto',true);return;}
  const p={
    id:genId(), nombre, marca:document.getElementById('projMarca').value,
    tipo:document.getElementById('projTipo').value,
    ubicacion:document.getElementById('projUbicacion').value.trim(),
    estado:'Sin iniciar', avanceFisico:0, montoObraCivil:0,
    pagos:{a1:{paid:false,pct:65},a2:{paid:false,pct:25},pf:{paid:false,pct:10},imp:{monto:0,paid:false}},
    cronograma:[{id:genId(),nombre:'Obra base',dias:5,sub:[]}],
    fechaInicio:'',fechaFin:'',contratista:'',supervisor:'',observaciones:''
  };
  S.proyectos.push(p); saveData();
  closeModal('newProjectModal');
  document.getElementById('projNombre').value='';
  document.getElementById('projUbicacion').value='';
  render(); toast('✓ Proyecto creado');
}

function eliminarProyecto(id){
  const p=S.proyectos.find(p=>p.id==id);
  if(!p) return;
  if(!confirm(`¿Eliminar "${p.nombre}"?\nEsta acción no se puede deshacer.`)) return;
  S.proyectos=S.proyectos.filter(p=>p.id!=id);
  saveData(); closeModal('projectDetailModal'); render(); toast('✓ Proyecto eliminado');
}

function actualizarProyecto(id,campo,valor){
  const p=S.proyectos.find(p=>p.id==id);
  if(p){p[campo]=valor;saveData();}
}

function actualizarPago(id,tipo,campo,valor){
  const p=S.proyectos.find(p=>p.id==id);
  if(p&&p.pagos[tipo]){p.pagos[tipo][campo]=valor;saveData();}
}

// ===================== VER PROYECTO =====================
function verProyecto(id){
  const p=S.proyectos.find(p=>p.id==id);
  if(!p) return;
  const c=document.getElementById('projectDetailContent');
  c.innerHTML=`
    <div class="modal-header">
      <span class="modal-title">📋 ${p.nombre}</span>
      ${badgeEstado(p.estado)}
    </div>
    <div class="tabs" id="detailTabs">
      <div class="tab active" data-tab="general">⚙ General</div>
      <div class="tab" data-tab="pagos">💰 Pagos</div>
      <div class="tab" data-tab="cronograma">📅 Cronograma</div>
    </div>
    <div id="detailPanel">${renderGeneral(p)}</div>`;
  openModal('projectDetailModal');
  document.querySelectorAll('#detailTabs .tab').forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll('#detailTabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const fp=S.proyectos.find(x=>x.id==id);
      const panel=document.getElementById('detailPanel');
      if(tab.dataset.tab==='general')    panel.innerHTML=renderGeneral(fp);
      if(tab.dataset.tab==='pagos')      panel.innerHTML=renderPagos(fp);
      if(tab.dataset.tab==='cronograma') panel.innerHTML=renderCronograma(fp);
    };
  });
}

function renderGeneral(p){
  return `
  <div class="input-row">
    <div class="form-group"><label>Nombre</label><input value="${esc(p.nombre)}" onchange="actualizarProyecto('${p.id}','nombre',this.value)"></div>
    <div class="form-group"><label>Marca</label>
      <select onchange="actualizarProyecto('${p.id}','marca',this.value)">
        ${S.marcas.map(m=>`<option ${p.marca===m?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="input-row">
    <div class="form-group"><label>Tipo</label>
      <select onchange="actualizarProyecto('${p.id}','tipo',this.value)">
        ${['Remodelación','Construcción nueva'].map(t=>`<option ${p.tipo===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Ubicación</label><input value="${esc(p.ubicacion||'')}" onchange="actualizarProyecto('${p.id}','ubicacion',this.value)"></div>
  </div>
  <div class="input-row">
    <div class="form-group"><label>Estado</label>
      <select onchange="actualizarProyecto('${p.id}','estado',this.value)">
        ${['Sin iniciar','En ejecución','Retrasado','Finalizado'].map(s=>`<option ${p.estado===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Monto Obra Civil ($)</label>
      <input type="number" min="0" value="${p.montoObraCivil||0}" onchange="actualizarProyecto('${p.id}','montoObraCivil',Math.max(0,parseFloat(this.value)||0))">
    </div>
  </div>
  <div class="form-group">
    <label>Avance Físico — <strong id="avLbl">${p.avanceFisico}%</strong></label>
    <input type="range" min="0" max="100" value="${p.avanceFisico}"
      oninput="document.getElementById('avLbl').textContent=this.value+'%'"
      onchange="actualizarProyecto('${p.id}','avanceFisico',parseInt(this.value))">
    <div class="progress-bar"><div class="progress-fill" style="width:${p.avanceFisico}%"></div></div>
  </div>
  <div class="input-row">

function renderPagos(p){
  const oc=parseFloat(p.montoObraCivil)||0;
  const a1=oc*(p.pagos.a1.pct/100), a2=oc*(p.pagos.a2.pct/100), pf=oc*(p.pagos.pf.pct/100);
  const imp=parseFloat(p.pagos.imp.monto)||0;
  const pagado=(p.pagos.a1.paid?a1:0)+(p.pagos.a2.paid?a2:0)+(p.pagos.pf.paid?pf:0)+(p.pagos.imp.paid?imp:0);
  const pendiente=(oc+imp)-pagado;
  const frow=(tipo,label,monto,paid)=>`<tr>
    <td>${label}</td><td><strong>${fmt(monto)}</strong></td>
    <td><span class="badge ${paid?'badge-success':'badge-neutral'}">${paid?'Pagado':'Pendiente'}</span></td>
    <td><label style="cursor:pointer;display:flex;align-items:center;gap:6px">
      <input type="checkbox" ${paid?'checked':''} onchange="actualizarPago('${p.id}','${tipo}','paid',this.checked);reloadPagos('${p.id}')"> Marcar pagado
    </label></td></tr>`;
  return `
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card"><div class="stat-label">Obra Civil</div><div class="stat-value" style="font-size:20px">${fmt(oc)}</div></div>
    <div class="stat-card"><div class="stat-label">Pagado</div><div class="stat-value" style="font-size:20px;color:#2db87a">${fmt(pagado)}</div></div>
    <div class="stat-card"><div class="stat-label">Pendiente</div><div class="stat-value" style="font-size:20px;color:#e84040">${fmt(pendiente)}</div></div>
  </div>
  <div class="table-wrap" id="pagosWrap">
    <table><thead><tr><th>Concepto</th><th>Monto</th><th>Estado</th><th>Acción</th></tr></thead>
    <tbody>
      ${frow('a1','1er Anticipo ('+p.pagos.a1.pct+'%)',a1,p.pagos.a1.paid)}
      ${frow('a2','2do Anticipo ('+p.pagos.a2.pct+'%)',a2,p.pagos.a2.paid)}
      ${frow('pf','Pago Final ('+p.pagos.pf.pct+'%)',pf,p.pagos.pf.paid)}
      <tr>
        <td>Imprevistos</td>
        <td><input type="number" min="0" value="${imp}" style="width:120px"
          onchange="actualizarPago('${p.id}','imp','monto',parseFloat(this.value)||0)"></td>
        <td><span class="badge ${p.pagos.imp.paid?'badge-success':'badge-neutral'}">${p.pagos.imp.paid?'Pagado':'Pendiente'}</span></td>
        <td><label style="cursor:pointer;display:flex;align-items:center;gap:6px">
          <input type="checkbox" ${p.pagos.imp.paid?'checked':''} onchange="actualizarPago('${p.id}','imp','paid',this.checked);reloadPagos('${p.id}')"> Marcar pagado
        </label></td>
      </tr>
    </tbody></table>
  </div>`;
}

function reloadPagos(id){
  const fp=S.proyectos.find(x=>x.id==id);
  const panel=document.getElementById('detailPanel');
  if(panel&&fp) panel.innerHTML=renderPagos(fp);
}

// ===================== CRONOGRAMA =====================
function renderCronograma(p){
  const diasTotal=p.cronograma.reduce((s,m)=>s+(parseInt(m.dias)||0),0);
  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Días Totales</div><div class="stat-value">${diasTotal}</div></div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>Partida / Subpartida</th><th>Días</th><th>Cantidad</th><th>Precio Unit.</th><th>Total</th><th></th></tr></thead>
    <tbody>`;
  p.cronograma.forEach((m,mi)=>{
    const subTotal=m.sub.reduce((s,x)=>s+((parseFloat(x.cantidad)||0)*(parseFloat(x.precio)||0)),0);
    html+=`<tr style="background:#161412">
      <td><input value="${esc(m.nombre)}" style="font-weight:600"
        onchange="updPartida('${p.id}',${mi},'nombre',this.value)"></td>
      <td><input type="number" min="1" value="${m.dias||1}" style="width:70px"
        onchange="updPartida('${p.id}',${mi},'dias',parseInt(this.value)||1)"></td>
      <td colspan="2" style="color:#777;font-size:12px">${m.sub.length} subpartida(s)</td>
      <td><strong>${fmt(subTotal)}</strong></td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="agregarSub('${p.id}',${mi})">+ Sub</button>
        <button class="btn btn-danger btn-sm" onclick="elimPartida('${p.id}',${mi})">✕</button>
      </td>
    </tr>`;
    m.sub.forEach((s,si)=>{
      const tot=(parseFloat(s.cantidad)||0)*(parseFloat(s.precio)||0);
      html+=`<tr style="background:#1a1815">
        <td style="padding-left:28px">
          <input type="checkbox" ${s.done?'checked':''} onchange="updSub('${p.id}',${mi},${si},'done',this.checked)">
          <input value="${esc(s.desc||'')}" placeholder="Descripción" style="width:calc(100% - 28px)"
            onchange="updSub('${p.id}',${mi},${si},'desc',this.value)">
        </td>
        <td><input type="number" min="1" value="${s.dias||1}" style="width:60px"
          onchange="updSub('${p.id}',${mi},${si},'dias',parseInt(this.value)||1)"></td>
        <td><input type="number" min="0" value="${s.cantidad||0}" style="width:80px" placeholder="Cant."
          onchange="updSub('${p.id}',${mi},${si},'cantidad',parseFloat(this.value)||0)"></td>
        <td><input type="number" min="0" value="${s.precio||0}" style="width:80px" placeholder="Precio"
          onchange="updSub('${p.id}',${mi},${si},'precio',parseFloat(this.value)||0)"></td>
        <td>${fmt(tot)}</td>
        <td><button class="btn btn-danger btn-sm" onclick="elimSub('${p.id}',${mi},${si})">✕</button></td>
      </tr>`;
    });
  });
  const grandTotal=p.cronograma.reduce((s,m)=>s+m.sub.reduce((ss,x)=>ss+((parseFloat(x.cantidad)||0)*(parseFloat(x.precio)||0)),0),0);
  html+=`<tr style="background:#161412;font-weight:700">
    <td colspan="4" style="text-align:right;padding-right:16px">TOTAL CRONOGRAMA:</td>
    <td>${fmt(grandTotal)}</td><td></td>
  </tr>`;
  html+=`</tbody></table></div>
  <div style="margin-top:14px">
    <button class="btn btn-primary" onclick="agregarPartida('${p.id}')">+ Agregar Partida</button>
  </div>`;
  return html;
}

function updPartida(pid,mi,campo,val){
  const p=S.proyectos.find(x=>x.id==pid);
  if(p&&p.cronograma[mi]){p.cronograma[mi][campo]=val;saveData();}
}
function updSub(pid,mi,si,campo,val){
  const p=S.proyectos.find(x=>x.id==pid);
  if(p&&p.cronograma[mi]&&p.cronograma[mi].sub[si]){p.cronograma[mi].sub[si][campo]=val;saveData();}
}
function agregarPartida(pid){
  const p=S.proyectos.find(x=>x.id==pid);
  if(!p) return;
  p.cronograma.push({id:genId(),nombre:'Nueva Partida',dias:5,sub:[]});
  saveData(); reloadCronograma(pid);
}
function agregarSub(pid,mi){
  const p=S.proyectos.find(x=>x.id==pid);
  if(!p||!p.cronograma[mi]) return;
  p.cronograma[mi].sub.push({id:genId(),desc:'',cantidad:0,precio:0,dias:3,done:false});
  saveData(); reloadCronograma(pid);
}
function elimPartida(pid,mi){
  const p=S.proyectos.find(x=>x.id==pid);
  if(!p) return;
  if(!confirm('¿Eliminar esta partida y sus subpartidas?')) return;
  p.cronograma.splice(mi,1); saveData(); reloadCronograma(pid);
}
function elimSub(pid,mi,si){
  const p=S.proyectos.find(x=>x.id==pid);
  if(!p||!p.cronograma[mi]) return;
  p.cronograma[mi].sub.splice(si,1); saveData(); reloadCronograma(pid);
}
function reloadCronograma(pid){
  const fp=S.proyectos.find(x=>x.id==pid);
  const panel=document.getElementById('detailPanel');
  if(panel&&fp) panel.innerHTML=renderCronograma(fp);
}

      <td><button class="btn btn-danger btn-sm" onclick="eliminarGasto('${g.id}')">✕</button></td></tr>`;
  });
  document.getElementById('content').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Gastos</div><div class="stat-value">${fmt(total)}</div></div>
      <div class="stat-card"><div class="stat-label">Registros</div><div class="stat-value">${S.gastos.length}</div></div>
    </div>
    <div class="stat-card" style="margin-bottom:20px">
      <div class="section-title" style="margin-top:0">Registrar Gasto</div>
      <div class="input-row">
        <div class="form-group"><label>Factura *</label><input id="gastoFactura" placeholder="No. factura"></div>
        <div class="form-group"><label>Proveedor *</label>
          <select id="gastoProveedor"><option value="">-- Seleccionar --</option>
            ${S.proveedores.map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="input-row">
        <div class="form-group"><label>Valor * ($)</label><input type="number" min="0" id="gastoValor" placeholder="0.00"></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="gastoFecha" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="form-group"><label>Descripción</label><input id="gastoDesc" placeholder="Descripción del gasto"></div>
      <button class="btn btn-primary" onclick="registrarGasto()">+ Registrar Gasto</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Factura</th><th>Descripción</th><th>Proveedor</th><th>Valor</th><th>Fecha</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function registrarGasto(){
  const factura=document.getElementById('gastoFactura').value.trim();
  const provId=document.getElementById('gastoProveedor').value;
  const valor=parseFloat(document.getElementById('gastoValor').value)||0;
  const desc=document.getElementById('gastoDesc').value.trim();
  const fecha=document.getElementById('gastoFecha').value;
  if(!factura){toast('Ingrese número de factura',true);return;}
  if(!provId){toast('Seleccione un proveedor',true);return;}
  if(valor<=0){toast('Ingrese un valor mayor a 0',true);return;}
  const prov=S.proveedores.find(p=>p.id===provId);
  S.gastos.push({id:genId(),factura,descripcion:desc,proveedor:prov?prov.nombre:'',valor,fecha});
  saveData(); render(); toast('✓ Gasto registrado');
}

function eliminarGasto(id){
  if(!confirm('¿Eliminar este gasto?')) return;
  S.gastos=S.gastos.filter(g=>g.id!==id); saveData(); render();
}

// ===================== RENDER PRINCIPAL =====================
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'📊'},
  {id:'proyectos',label:'Proyectos',icon:'🏗'},
  {id:'gastos',label:'Gastos',icon:'🧾'},
  {id:'proveedores',label:'Proveedores',icon:'🤝'},
  {id:'centros',label:'Centros de Costo',icon:'📁'},
  {id:'config',label:'Configuración',icon:'⚙'},
];

function render(){
  // Cerrar sidebar en móvil al navegar
  if(window.innerWidth<=768) closeSidebar();

  document.getElementById('nav').innerHTML=NAV.map(i=>`
    <div class="nav-item ${S.activeTab===i.id?'active':''}" onclick="goTab('${i.id}')">
      <span>${i.icon}</span><span>${i.label}</span>
    </div>`).join('');

  const titles={dashboard:'Dashboard',proyectos:'Proyectos',gastos:'Gastos',
    proveedores:'Proveedores',centros:'Centros de Costo',config:'Configuración'};
  document.getElementById('pageTitle').textContent=titles[S.activeTab]||S.activeTab;

  // Botón de header contextual
  const ha=document.getElementById('headerActions');
  if(S.activeTab==='proyectos'||S.activeTab==='dashboard'){
    ha.innerHTML=`<button class="btn btn-primary" onclick="openModal('newProjectModal');refreshMarcaSelect()">+ Nuevo Proyecto</button>`;

  else if(S.activeTab==='proveedores') renderProveedores();
  else if(S.activeTab==='centros')   renderCentros();
  else if(S.activeTab==='config')    renderConfig();
}

  S.centrosCosto.forEach(c=>{
    rows+=`<tr><td>${esc(c.nombre)}</td><td>${esc(c.descripcion||'—')}</td>
      <td><button class="btn btn-danger btn-sm" onclick="eliminarCentro('${c.id}')">✕</button></td></tr>`;
  });
  document.getElementById('content').innerHTML=`
    <div class="stat-card" style="margin-bottom:20px">
      <div class="input-row">
        <div class="form-group"><label>Nombre *</label><input id="ccNombre" placeholder="Centro de costo"></div>
        <div class="form-group"><label>Descripción</label><input id="ccDesc" placeholder="Descripción opcional"></div>
      </div>
      <button class="btn btn-primary" onclick="registrarCentro()">+ Agregar</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Nombre</th><th>Descripción</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function registrarCentro(){
  const nombre=document.getElementById('ccNombre').value.trim();
  if(!nombre){toast('Ingrese nombre del centro',true);return;}
  S.centrosCosto.push({id:genId(),nombre,descripcion:document.getElementById('ccDesc').value.trim()});
  saveData(); render(); toast('✓ Centro registrado');
}

function eliminarCentro(id){
  if(!confirm('¿Eliminar este centro de costo?')) return;
  S.centrosCosto=S.centrosCosto.filter(c=>c.id!==id); saveData(); render();
}

function goTab(tab){S.activeTab=tab;render();}

// ===================== ESCAPE HTML =====================
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Solo mostrar login al inicio, ya montado en el HTML
</script>
