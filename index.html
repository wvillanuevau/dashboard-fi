<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Proyectos Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Karla',sans-serif;background:#0e0d0b;color:#e8e6e1}
  .app{display:flex;min-height:100vh}
  .sidebar{width:260px;background:#1a1815;border-right:1px solid #2a2824;padding:20px}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#e8a020}
  .nav-item{padding:10px;margin:5px 0;cursor:pointer;border-radius:8px}
  .nav-item:hover{background:#25221e}
  .nav-item.active{background:#e8a020;color:#000}
  .main{flex:1;padding:20px}
  .btn{padding:8px 16px;border-radius:8px;cursor:pointer;background:#e8a020;border:none;font-weight:bold}
  .btn-secondary{background:#25221e;color:#fff}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000}
  .modal.open{display:flex}
  .modal-content{background:#1a1815;padding:20px;border-radius:16px;width:90%;max-width:500px}
  .form-group{margin-bottom:15px}
  .form-group label{display:block;margin-bottom:5px}
  input,select{width:100%;padding:8px;background:#25221e;border:1px solid #2a2824;color:#fff;border-radius:6px}
  .toast{position:fixed;bottom:20px;right:20px;background:#1a1815;padding:10px 20px;border-radius:8px;display:none;z-index:2000}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">📊 Proyectos Pro</div>
    <div style="font-size:12px;color:#888;margin:10px 0">Dashboard de Control</div>
    <div id="nav"></div>
    <div style="margin-top:30px"><button class="btn btn-secondary" onclick="logout()">Cerrar sesión</button></div>
  </div>
  <div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 id="pageTitle">Dashboard</h2>
      <button class="btn" onclick="openModal('newProjectModal')">+ Nuevo proyecto</button>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<div id="newProjectModal" class="modal">
  <div class="modal-content">
    <h3>Nuevo Proyecto</h3>
    <div class="form-group"><label>Nombre</label><input id="projNombre"></div>
    <div class="form-group"><label>Marca</label><select id="projMarca"></select></div>
    <div class="form-group"><label>Tipo</label><select id="projTipo"><option>Remodelación</option><option>Construcción nueva</option></select></div>
    <div class="form-group"><label>Ubicación</label><input id="projUbicacion"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">Cancelar</button>
      <button class="btn" onclick="crearProyecto()">Crear</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIGURACIÓN INICIAL ====================
let STATE = {
  proyectos: [],
  marcas: ["Papa Johns", "Jimmy Johns"],
  usuarios: [{ nombre: "Admin", pin: "1234", rol: "admin" }],
  empresaActual: "DEMO",
  activeTab: "dashboard"
};

// ==================== FUNCIONES AUXILIARES ====================
function toast(msg, isError) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 2000);
}

function openModal(id) {
  document.getElementById(id).classList.add("open");
}
function closeModal(id) {
  document.getElementById(id).classList.remove("open");
}

function fmt(n) {
  return "$" + (parseFloat(n) || 0).toLocaleString("en-US", {minimumFractionDigits:2});
}

// ==================== PROYECTOS ====================
function crearProyecto() {
  var nombre = document.getElementById("projNombre").value.trim();
  if (!nombre) { toast("Ingrese nombre", true); return; }
  var nuevo = {
    id: Date.now(),
    nombre: nombre,
    marca: document.getElementById("projMarca").value,
    tipo: document.getElementById("projTipo").value,
    ubicacion: document.getElementById("projUbicacion").value,
    estado: "Sin iniciar",
    avanceFisico: 0,
    montoObraCivil: 0
  };
  STATE.proyectos.push(nuevo);
  localStorage.setItem("proyectos_demo", JSON.stringify(STATE.proyectos));
  closeModal("newProjectModal");
  render();
  toast("Proyecto creado");
}

function eliminarProyecto(id) {
  if (!confirm("¿Eliminar?")) return;
  STATE.proyectos = STATE.proyectos.filter(function(p) { return p.id != id; });
  localStorage.setItem("proyectos_demo", JSON.stringify(STATE.proyectos));
  render();
}

// ==================== RENDER ====================
function render() {
  renderNav();
  if (STATE.activeTab === "dashboard") renderDashboard();
  else if (STATE.activeTab === "proyectos") renderProyectos();
}

function renderNav() {
  var nav = document.getElementById("nav");
  var items = [
    { id: "dashboard", label: "Dashboard" },
    { id: "proyectos", label: "Proyectos" }
  ];
  var html = "";
  for (var i = 0; i < items.length; i++) {
    var active = (STATE.activeTab === items[i].id) ? "active" : "";
    html += '<div class="nav-item ' + active + '" onclick="goTab(\'' + items[i].id + '\')">' + items[i].label + '</div>';
  }
  nav.innerHTML = html;
}

function goTab(tab) {
  STATE.activeTab = tab;
  render();
}

function renderDashboard() {
  var total = STATE.proyectos.length;
  var inversion = 0;
  for (var i = 0; i < STATE.proyectos.length; i++) {
    inversion += STATE.proyectos[i].montoObraCivil;
  }
  var html = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">';
  html += '<div style="background:#1a1815;padding:20px;border-radius:12px"><div>Total Proyectos</div><div style="font-size:28px">' + total + '</div></div>';
  html += '<div style="background:#1a1815;padding:20px;border-radius:12px"><div>Inversión Total</div><div style="font-size:28px">' + fmt(inversion) + '</div></div>';
  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

function renderProyectos() {
  if (STATE.proyectos.length === 0) {
    document.getElementById("content").innerHTML = '<div style="text-align:center;padding:40px">No hay proyectos. Crea uno nuevo.</div>';
    return;
  }
  var html = '<div style="display:grid;gap:16px">';
  for (var i = 0; i < STATE.proyectos.length; i++) {
    var p = STATE.proyectos[i];
    html += '<div style="background:#1a1815;padding:16px;border-radius:12px">';
    html += '<div style="display:flex;justify-content:space-between"><strong>' + p.nombre + '</strong><button class="btn btn-secondary" onclick="eliminarProyecto(' + p.id + ')">Eliminar</button></div>';
    html += '<div>Marca: ' + p.marca + '</div>';
    html += '<div>Estado: ' + p.estado + '</div>';
    html += '<div>Avance: ' + p.avanceFisico + '%</div>';
    html += '<div>Monto: ' + fmt(p.montoObraCivil) + '</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

// ==================== LOGIN SIMULADO ====================
function login() {
  // Simulación: se salta el login para pruebas
  // En realidad aquí iría la pantalla de código de empresa y PIN
  // Pero para que funcione directamente, cargamos datos de ejemplo
  var saved = localStorage.getItem("proyectos_demo");
  if (saved) {
    STATE.proyectos = JSON.parse(saved);
  } else {
    STATE.proyectos = [];
  }
  // Cargar marcas en el select del modal
  var selectMarca = document.getElementById("projMarca");
  if (selectMarca) {
    selectMarca.innerHTML = "";
    for (var i = 0; i < STATE.marcas.length; i++) {
      var option = document.createElement("option");
      option.text = STATE.marcas[i];
      selectMarca.appendChild(option);
    }
  }
  render();
}

login();
</script>
</body>
</html>
